<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XAT USER SEARCH</title>
<style>
body{background:#0b0c10;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
.box{width:500px;background:#151820;padding:20px;border-radius:15px}
input,button{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none}
.card{background:#222;padding:10px;margin-top:10px;border-radius:10px}
</style>
</head>

<body>

<div class="box">
<h2>XAT SEARCH</h2>

<input id="user" placeholder="Enter XAT username">
<button onclick="search()">Search</button>

<div class="card">Name: <span id="name"></span></div>
<div class="card">Info: <span id="info"></span></div>

</div>

<script>

async function search(){

  let u = document.getElementById("user").value.trim();
  if(!u) return;

  try {

    // جلب صفحة البروفايل العامة
    let url = `https://xat.com/web_gear/chat/profile.php?name=${u}`;

    let res = await fetch(url);
    let text = await res.text();

    // استخراج الاسم من الصفحة
    let nameMatch = text.match(/<title>(.*?)<\/title>/);

    document.getElementById("name").innerText =
      nameMatch ? nameMatch[1] : "Not found";

    document.getElementById("info").innerText =
      "Loaded from XAT public page";

  } catch(e){
    document.getElementById("name").innerText = "Error loading user";
  }
}

</script>

</body>
</html>
