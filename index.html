<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT Proper Color Engine</title>

<style>
body{
  background:#0b0b10;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:480px;
  padding:20px;
  background:#151522;
  border-radius:15px;
}

input[type="text"]{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

.colorRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:5px 0;
}

input[type="color"]{
  width:60px;
  height:35px;
  border:none;
  cursor:pointer;
}

/* 🎨 Gradient Preview */
.previewBar{
  width:100%;
  height:50px;
  border-radius:10px;
  margin-top:10px;
  border:2px solid #333;
}

/* 👁 Name Preview */
.namePreview{
  margin-top:10px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
}

/* ✨ Glow */
.glow{
  text-shadow:0 0 10px #fff, 0 0 20px #fff;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#6c5ce7;
  color:#fff;
  font-weight:bold;
}

.output{
  margin-top:10px;
  background:#0d0d14;
  padding:10px;
  border-radius:8px;
  font-family:monospace;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="box">

<h2>🌈 XAT COLOR ENGINE (FIXED)</h2>

<input id="name" type="text" placeholder="Enter Name">

<div class="colorRow">C1 <input type="color" id="c1"></div>
<div class="colorRow">C2 <input type="color" id="c2"></div>
<div class="colorRow">C3 <input type="color" id="c3"></div>
<div class="colorRow">C4 <input type="color" id="c4"></div>
<div class="colorRow">C5 <input type="color" id="c5"></div>

<button onclick="generate()">Generate</button>

<div class="previewBar" id="bar"></div>

<div id="namePreview" class="namePreview"></div>

<div class="output" id="codeOut"></div>

</div>

<script>
function generate(){

  const name = document.getElementById("name").value || "USER";

  const colors = [
    document.getElementById("c1").value || "#7B7CA3",
    document.getElementById("c2").value || "#999acb",
    document.getElementById("c3").value || "#999acb",
    document.getElementById("c4").value || "#B7B8F2",
    document.getElementById("c5").value || "#fcfcf0"
  ];

  // 🎨 Live Gradient Preview
  document.getElementById("bar").style.background =
    `linear-gradient(to right, ${colors.join(",")})`;

  // 👁 Name Preview (Glow فقط)
  document.getElementById("namePreview").innerHTML =
    `<div class="glow">${name}</div>`;

  // 🔥 Correct XAT Code
  const xatCode =
    `glow#${colors[0]}#grad#r50#o1#` + colors.join("#");

  document.getElementById("codeOut").innerText = xatCode;
}
</script>

</body>
</html>
