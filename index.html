<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  min-height:100vh;
  background:#05060a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BACKGROUND */
body::before{
  content:"RAMY";
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12vw;
  font-weight:900;
  color:rgba(255,255,255,0.05);
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,213,0.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(124,92,255,0.15), transparent 45%);
  z-index:-1;
}

/* APP */
.app{
  width:100%;
  max-width:1100px;
  height:90vh;
  display:flex;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}

/* SIDEBAR */
.sidebar{
  width:220px;
  padding:15px;
  background:rgba(0,0,0,0.3);
}

.myname{
  text-align:center;
  font-weight:900;
  margin-bottom:20px;
}

.nav{
  padding:12px;
  margin:8px 0;
  text-align:center;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  cursor:pointer;
}

.nav:hover{background:rgba(255,255,255,0.15);}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.section{display:none;}
.active{display:block;}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
  z-index:999;
}

.box{
  width:320px;
  padding:20px;
  background:#111;
  border-radius:15px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  text-align:center;
}

/* CARD */
.card{
  padding:12px;
  margin:10px 0;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  cursor:pointer;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:20px;
  display:block;
  margin:10px auto;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  color:#000;
  padding:8px 15px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
#toast.show{opacity:1;bottom:40px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>LOGIN</h3>
    <input id="pass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
  </div>
</div>

<div class="app">

  <div class="sidebar">
    <div class="myname">RAMY</div>
    <div class="nav" onclick="show('home')">Home</div>
    <div class="nav" onclick="show('info')">User Info</div>
    <div class="nav" onclick="show('history')">History</div>
  </div>

  <div class="main">

    <!-- HOME -->
    <div id="home" class="section active">
      <input id="search" placeholder="Search ID or Name" onkeydown="if(event.key==='Enter')searchUser()">
      <button onclick="searchUser()">Search</button>
    </div>

    <!-- USER INFO -->
    <div id="info" class="section">
      <img id="avatar" class="avatar">
      <div class="card">Name: <span id="name"></span></div>
      <div class="card">ID: <span id="uid"></span></div>
      <div class="card">Username: <span id="nick"></span></div>
      <div class="card">Avatar: <span id="img"></span></div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="section"></div>

  </div>
</div>

<div id="toast"></div>

<script>

/* 🔥 ضع الـ API هنا */
const API_URL = "https://pythbots.com/api/xatprofile.php?u=";

let historyList = [];

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg){
  let t=document.getElementById('toast');
  t.innerText=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1200);
}

function login(){
  if(pass.value==="2035"){
    login.style.display="none";
  }else{
    alert("Wrong password");
  }
}

async function searchUser(){
  let q=document.getElementById("search").value;
  if(!q) return;

  try{
    let res=await fetch(API_URL + q);
    let d=await res.json();

    document.getElementById("name").innerText = d.name || "N/A";
    document.getElementById("uid").innerText = d.id || "N/A";
    document.getElementById("nick").innerText = d.nick || "N/A";
    document.getElementById("img").innerText = d.avatar || "N/A";
    document.getElementById("avatar").src = d.avatar || "";

    historyList.push(d.name + " (" + d.id + ")");
    renderHistory();

    show('info');

  }catch(e){
    toast("API Error");
  }
}

function renderHistory(){
  let box=document.getElementById("history");
  box.innerHTML = historyList.map(h=>`<div class="card">${h}</div>`).join("");
}

</script>

</body>
</html>
