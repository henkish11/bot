<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT Full Info Search</title>

<style>
body{
  background:#05060a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

input,button{
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

.card{
  margin-top:20px;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  display:inline-block;
  min-width:340px;
  text-align:left;
}

img{
  width:120px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🌍 XAT FULL INFO SEARCH</h1>

<input id="q" placeholder="Search ID or Username">
<button onclick="search()">Search</button>

<div class="card" id="out">No data</div>

<script>

const API = "https://pythbots.com/api/xatprofile.php?u=";

async function search(){
  const q = document.getElementById("q").value;
  if(!q) return;

  try{
    const res = await fetch(API + q);
    const d = await res.json();

    render(d);

  }catch(e){
    document.getElementById("out").innerHTML = "❌ Error loading data";
  }
}

function render(d){

  // 🧠 عرض كل البيانات الموجودة تلقائيًا
  let html = "";

  for(let key in d){
    if(key.toLowerCase().includes("avatar") || key.toLowerCase().includes("image")){
      html += `<b>${key.toUpperCase()}</b><br><img src="${d[key]}"><br><br>`;
    }else{
      html += `<b>${key.toUpperCase()}</b>: ${d[key]}<br>`;
    }
  }

  document.getElementById("out").innerHTML = html || "No data found";
}

</script>

</body>
</html>
