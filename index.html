<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT COLOR ENGINE</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

.panel{
  max-width:700px;
  margin:auto;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin-top:10px;
  width:100%;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#6c5ce7;
  color:#fff;
  font-weight:bold;
}

#preview{
  font-size:40px;
  text-align:center;
  margin:20px 0;
  font-weight:bold;
}

/* 🌈 Wave Animation */
.wave span{
  display:inline-block;
  animation:wave 1.2s infinite ease-in-out;
}

@keyframes wave{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-10px); }
}
</style>
</head>

<body>

<div class="panel">

<h2>⚡ XAT COLOR ENGINE V3</h2>

<input id="name" placeholder="Enter Name">

<input id="glow" placeholder="Glow Color (#000000)">
<input id="g1" placeholder="Gradient 1">
<input id="g2" placeholder="Gradient 2">
<input id="g3" placeholder="Gradient 3">
<input id="g4" placeholder="Gradient 4">
<input id="g5" placeholder="Gradient 5">

<button onclick="apply()">Apply Preview</button>
<button onclick="generate()">Generate XAT Code</button>

<div id="preview"></div>

<textarea id="output" rows="4" style="width:100%;margin-top:10px;"></textarea>

</div>

<script>

function apply(){
  let name = document.getElementById("name").value;

  let preview = document.getElementById("preview");
  preview.innerHTML = "";

  for(let i=0;i<name.length;i++){
    let span = document.createElement("span");
    span.textContent = name[i];

    // gradient effect per letter
    let colors = [
      document.getElementById("g1").value,
      document.getElementById("g2").value,
      document.getElementById("g3").value,
      document.getElementById("g4").value,
      document.getElementById("g5").value
    ];

    span.style.color = colors[i % colors.length];

    preview.appendChild(span);
  }

  preview.classList.add("wave");
}

function generate(){
  let glow = document.getElementById("glow").value || "#000000";

  let g1 = document.getElementById("g1").value;
  let g2 = document.getElementById("g2").value;
  let g3 = document.getElementById("g3").value;
  let g4 = document.getElementById("g4").value;
  let g5 = document.getElementById("g5").value;

  let code =
`glow#${glow}#grad#r50#o1#${g1}#${g2}#${g3}#${g4}#${g5}`;

  document.getElementById("output").value = code;
}

</script>

</body>
</html>
