<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT Codes System</title>

<style>
body{
  background:#05060a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

input,button{
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

.card{
  margin-top:20px;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  display:inline-block;
  min-width:320px;
}

img{
  width:110px;
  border-radius:14px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🌍 XAT CODES SYSTEM</h1>

<input id="q" placeholder="Enter ID or Username">
<button onclick="search()">Search</button>

<div class="card" id="out">No data</div>

<script>

// 🔗 API الحقيقي
const API = "https://pythbots.com/api/xatprofile.php?u=";

// 🧠 fallback
const fallback = {
  id: "-",
  username: "-",
  image: "https://xatimg.com/image/NTKWfOtODi9Z.jpg"
};

async function search(){
  const q = document.getElementById("q").value;

  if(!q) return;

  try{
    const res = await fetch(API + q);
    const d = await res.json();

    const data = {
      idCode: d.id || fallback.id,
      usernameCode: d.nick || d.username || fallback.username,
      imageCode: d.avatar || fallback.image
    };

    render(data);

  }catch(e){
    render({
      idCode: fallback.id,
      usernameCode: fallback.username,
      imageCode: fallback.image
    });
  }
}

function render(d){
  document.getElementById("out").innerHTML = `
    🆔 ID CODE: ${d.idCode}<br>
    👤 USERNAME CODE: ${d.usernameCode}<br>
    🖼️ IMAGE CODE:<br>
    <img src="${d.imageCode}">
  `;
}

</script>

</body>
</html>
