<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT Color Picker Engine</title>

<style>
body{
  background:#0b0b10;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:450px;
  padding:20px;
  background:#151522;
  border-radius:15px;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

input[type="text"]{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  outline:none;
}

.colorRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:6px 0;
  gap:10px;
}

input[type="color"]{
  width:60px;
  height:35px;
  border:none;
  background:none;
  cursor:pointer;
}

.previewName{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.glow{
  text-shadow:0 0 10px #6c5ce7, 0 0 20px #6c5ce7;
}

.wave span{
  display:inline-block;
  animation:wave 1.2s infinite ease-in-out;
}

.wave span:nth-child(2){animation-delay:0.1s}
.wave span:nth-child(3){animation-delay:0.2s}
.wave span:nth-child(4){animation-delay:0.3s}
.wave span:nth-child(5){animation-delay:0.4s}

@keyframes wave{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#6c5ce7;
  color:#fff;
  font-weight:bold;
}

.output{
  margin-top:10px;
  background:#0d0d14;
  padding:10px;
  border-radius:8px;
  font-family:monospace;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="box">

<h2>🌈 XAT COLOR ENGINE VIP</h2>

<input id="name" type="text" placeholder="Enter Name">

<div class="colorRow">Color 1 <input type="color" id="c1"></div>
<div class="colorRow">Color 2 <input type="color" id="c2"></div>
<div class="colorRow">Color 3 <input type="color" id="c3"></div>
<div class="colorRow">Color 4 <input type="color" id="c4"></div>
<div class="colorRow">Color 5 <input type="color" id="c5"></div>

<button onclick="generate()">Generate XAT Code</button>

<div id="preview" class="previewName"></div>
<div id="result" class="output"></div>

</div>

<script>
function waveText(text){
  return '<div class="wave">' +
    text.split('').map(c=>`<span>${c}</span>`).join('') +
  '</div>';
}

function generate(){
  const name = document.getElementById("name").value || "USER";

  let colors = [
    document.getElementById("c1").value,
    document.getElementById("c2").value,
    document.getElementById("c3").value,
    document.getElementById("c4").value,
    document.getElementById("c5").value
  ];

  const glow = colors[0]; // أول لون Glow تلقائي

  const code = `glow#${glow}#grad#r50#o1#` + colors.join("#");

  document.getElementById("preview").innerHTML =
    `<div class="glow">${waveText(name)}</div>`;

  document.getElementById("result").innerText = code;
}
</script>

</body>
</html>
