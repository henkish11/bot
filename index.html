<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OUTSIDE WEB LIMITS 👑</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0b1020,#05070f);
  color:#fff;
  overflow-x:hidden;
}
.container{
  max-width:1200px;
  margin:40px auto;
  padding:20px;
}
.title{
  font-size:34px;
  text-align:center;
  font-weight:bold;
  background:linear-gradient(90deg,#00f5ff,#ff00ff,#00ff85,#ffd000);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 3s infinite linear;
}
@keyframes shine{
  0%{filter:hue-rotate(0deg)}
  100%{filter:hue-rotate(360deg)}
}
.panel{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}
.card{
  background:rgba(18,24,40,0.9);
  padding:20px;
  border-radius:16px;
  box-shadow:0 0 30px rgba(0,255,255,0.15);
  backdrop-filter:blur(10px);
}
input, select, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#0b1220;
  color:#fff;
  outline:none;
}
button{
  margin-top:10px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.03);
}
.preview{
  font-size:34px;
  text-align:center;
  margin-top:20px;
  min-height:70px;
}
.codebox{
  background:#0a0f1c;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  font-family:monospace;
  font-size:12px;
  white-space:pre-wrap;
}
.glow{
  text-shadow:0 0 10px #00f5ff,0 0 20px #ff00ff;
}

/* NAME WAVE PRO 👑 */
.wave span{
  display:inline-block;
  animation:wave 1.2s infinite ease-in-out;
}
.wave span:nth-child(odd){animation-delay:0.1s}
.wave span:nth-child(even){animation-delay:0.2s}
@keyframes wave{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.vault{
  margin-top:10px;
  padding:10px;
  background:#070b14;
  border-radius:10px;
}
</style>
</head>
<body>

<div class="container">
  <div class="title">OUTSIDE WEB LIMITS 👑</div>

  <div class="panel">

    <div class="card">
      <h3>⚙️ CONTROL CORE</h3>
      <input id="name" placeholder="XAT Name" />
      <input id="color1" type="color" value="#00f5ff" />
      <input id="color2" type="color" value="#ff00ff" />

      <select id="effect">
        <option value="none">No Effect</option>
        <option value="glow">Glow</option>
        <option value="wave">NameWave PRO</option>
        <option value="combo">GOD Combo</option>
      </select>

      <h4>🔐 Password Vault (local)</h4>
      <input id="vault" placeholder="اكتب أسرارك هنا" />

      <button onclick="generate()">🚀 RUN OUTSIDE LIMITS</button>
    </div>

    <div class="card">
      <h3>⚡ REALITY OUTPUT</h3>
      <div id="preview" class="preview"></div>
      <div id="code" class="codebox"></div>
      <div class="vault" id="vaultOut"></div>
      <button onclick="copyCode()">📋 COPY CODE</button>
    </div>

  </div>
</div>

<script>
function wrapWave(text){
  return text.split('').map(c=>`<span>${c}</span>`).join('');
}

function generate(){
  let name=document.getElementById('name').value;
  let c1=document.getElementById('color1').value;
  let c2=document.getElementById('color2').value;
  let effect=document.getElementById('effect').value;
  let vault=document.getElementById('vault').value;

  let preview=document.getElementById('preview');
  let code=document.getElementById('code');
  let vaultOut=document.getElementById('vaultOut');

  let style=`background:linear-gradient(90deg,${c1},${c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent;`;

  preview.className='preview';

  if(effect==='glow'){
    preview.classList.add('glow');
    preview.innerHTML=name;
  }
  else if(effect==='wave'){
    preview.classList.add('wave');
    preview.innerHTML=wrapWave(name);
  }
  else if(effect==='combo'){
    preview.classList.add('glow','wave');
    preview.innerHTML=wrapWave(name);
  }
  else{
    preview.innerHTML=name;
  }

  preview.style=style;

  code.textContent = `<span style=\"${style}\">${name}</span>`;

  vaultOut.innerHTML = vault ? `🔐 Vault Saved: ${vault}` : '';
}

function copyCode(){
  navigator.clipboard.writeText(document.getElementById('code').textContent);
  alert('COPIED 👑');
}
</script>

</body>
</html>
