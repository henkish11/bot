<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile - GOD SYSTEM V2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: radial-gradient(circle at top,#010514,#020617);
  color:#fff;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
  z-index:50;
}
.login-box{
  width:320px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}
.login-box input{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#0f172a;
  border:none;
  color:#fff;
  border-radius:8px;
}
.login-box button{
  width:100%;
  padding:10px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:8px;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:10;
}

.status{
  font-size:12px;
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8;
}

.container{
  max-width:1100px;
  margin:80px auto;
  padding:20px;
}

.profile{
  background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.1);
  padding:25px;
  backdrop-filter:blur(18px);
  box-shadow:0 0 70px rgba(0,140,255,0.25);
}

.top{
  display:flex;
  gap:20px;
  align-items:center;
}

.top img{
  width:130px;
  height:130px;
  border-radius:50%;
  border:3px solid #00c3ff;
  animation:float 3s infinite ease-in-out;
}

.name{
  font-size:42px;
  font-weight:700;
  color:#4fc3ff;
  text-shadow:0 0 20px rgba(79,195,255,0.8);
}

.tabs{
  display:flex;
  gap:10px;
  margin-top:25px;
  flex-wrap:wrap;
}

.tab{
  padding:10px 18px;
  border-radius:10px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  cursor:pointer;
}

.grid{
  margin-top:20px;
  display:none;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.grid.active{display:grid;}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
}

.world{
  display:block;
  padding:20px;
  border-radius:15px;
  background:rgba(0,195,255,0.1);
  text-decoration:none;
  color:#fff;
}

/* HIDDEN AUDIO */
#audioPlayer{
  display:none;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- AUDIO -->
<audio id="audioPlayer" loop>
  <source src="https://stream.radiojar.com/8s5u5tpdtwzuv" type="audio/mpeg">
</audio>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h3>ACCESS</h3>
    <input id="password" type="password">
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div class="topbar">
  <div class="status" id="status">⚡ System: OFFLINE</div>
</div>

<div class="container">
<div class="profile">

<div class="top">
<img src="https://xatimg.com/image/RKP5IrStF45l.png">
<div>
<div class="name">Ramy</div>
</div>
</div>

<div class="tabs">
<div class="tab" onclick="showTab('info')">Info</div>
<div class="tab" onclick="showTab('worlds')">Chats</div>
</div>

<div class="grid active" id="info">
<div class="card">❤️ القرآن شغال تلقائي ❤️</div>
</div>

<div class="grid" id="worlds">
<a href="https://xat.com/2ra" target="_blank" class="world">2ra</a>
</div>

</div>
</div>

<script>
// LOGIN
function enter(){
  let p = document.getElementById('password').value;

  if(p === "106080"){
    document.getElementById('login').style.display='none';
    document.getElementById('status').innerText='⚡ System: ONLINE';

    let audio = document.getElementById("audioPlayer");
    audio.play().catch(()=>{});
  } else {
    alert("Wrong password");
  }
}

// ENTER KEY
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    enter();
  }
});

// TABS
function showTab(id){
  document.querySelectorAll('.grid').forEach(g=>g.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// BG
const c=document.getElementById('bg');
const x=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;
let p=[];
for(let i=0;i<60;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
function a(){
  x.clearRect(0,0,c.width,c.height);
  x.fillStyle="#38bdf8";
  p.forEach(o=>{
    x.beginPath();
    x.arc(o.x,o.y,o.r,0,6.28);
    x.fill();
  });
  requestAnimationFrame(a);
}
a();
</script>

</body>
</html>
