<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAT Ultra God Profile System</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0b0b0f;
    color:white;
}
.header{
    padding:20px;
    text-align:center;
    background:linear-gradient(90deg,#000,#111,#000);
    border-bottom:1px solid #222;
}
.profile-card{
    max-width:900px;
    margin:20px auto;
    padding:20px;
    background:#12121a;
    border-radius:12px;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
}
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #444;
}
.tabs{
    display:flex;
    justify-content:center;
    margin-top:20px;
    gap:10px;
}
.tab{
    padding:10px 15px;
    background:#1a1a25;
    border-radius:8px;
    cursor:pointer;
}
.tab.active{
    background:#2b2b40;
    box-shadow:0 0 10px #00f;
}
.section{
    display:none;
    margin-top:20px;
}
.section.active{
    display:block;
}
input, select{
    padding:8px;
    margin:5px;
    border-radius:6px;
    border:none;
}
button{
    padding:10px 15px;
    background:#0066ff;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#0051cc;
}
.preview{
    margin-top:15px;
    padding:15px;
    background:#000;
    border-radius:8px;
    font-weight:bold;
}
.glow{
    text-shadow:0 0 5px #00f,0 0 10px #00f;
}
.gradient-text{
    background:linear-gradient(45deg,#ff0000,#00ffcc,#0066ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
</style>

</head>
<body>

<div class="header">
    <h1>👑 XAT ULTRA GOD SYSTEM</h1>
    <p>Full Profile + Namegrad Engine</p>
</div>

<div class="profile-card">

    <img class="avatar" src="https://xatimg.com/image/RKP5IrStF45l.png">

    <h2 class="gradient-text">ramy</h2>
    <p>ID: 106080 | User: iegypt</p>

    <div class="tabs">
        <div class="tab active" onclick="showTab('info')">Info</div>
        <div class="tab" onclick="showTab('namegrad')">Namegrad</div>
        <div class="tab" onclick="showTab('powers')">Powers</div>
    </div>

    <!-- INFO -->
    <div id="info" class="section active">
        <h3>Profile Info</h3>
        <p>Status: 👑 Ultra God Mode Active</p>
    </div>

    <!-- NAMEGRAD -->
    <div id="namegrad" class="section">
        <h3>Namegrad Generator</h3>

        <input id="text" value="FEXBots">
        <input id="c1" type="color" value="#000000">
        <input id="c2" type="color" value="#ffffff">
        <input id="glow" type="color" value="#0000ff">

        <button onclick="generate()">Generate</button>

        <div class="preview" id="preview">Preview Here</div>
        <input id="output" style="width:100%" readonly>
    </div>

    <!-- POWERS -->
    <div id="powers" class="section">
        <h3>Ultra Powers</h3>
        <ul>
            <li>⚡ Name Gradient Engine</li>
            <li>🔥 Glow Text System</li>
            <li>🌌 Animated Namewave (Lite)</li>
        </ul>
    </div>

</div>

<script>
function showTab(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
}

function generate(){
    let text = document.getElementById('text').value;
    let c1 = document.getElementById('c1').value;
    let c2 = document.getElementById('c2').value;
    let glow = document.getElementById('glow').value;

    let gradient = `linear-gradient(45deg, ${c1}, ${c2})`;

    let html = `<span style="background:${gradient};-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${text}</span>`;

    document.getElementById('preview').innerHTML = html;

    let code = `(glow#${glow.replace('#','')}#grad#r45#${c1.replace('#','')}#${c2.replace('#','')})`;
    document.getElementById('output').value = code;
}
</script>

</body>
</html>
