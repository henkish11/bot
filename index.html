<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHARAOH LIMIT BREAK</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
    color:#f5d27a;
}

/* ===== VIDEO BACKGROUND ===== */
#bgVideo{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
    filter:brightness(0.35) contrast(1.4);
}

/* ===== PARTICLES CANVAS ===== */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:1;
}

/* ===== LIGHT SHAKE LAYER ===== */
.flash{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle,rgba(255,215,0,0.2),transparent);
    animation:flash 4s infinite alternate;
    z-index:2;
}

@keyframes flash{
    from{opacity:0.2;transform:scale(1);}
    to{opacity:0.05;transform:scale(1.2);}
}

/* ===== LOGIN ===== */
#login{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
    backdrop-filter:blur(10px);
}

.box{
    padding:30px;
    background:rgba(0,0,0,0.8);
    border:2px solid gold;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 60px gold;
}

input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    text-align:center;
}

button{
    background:gold;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

/* ===== MAIN UI ===== */
#content{
    display:none;
    position:relative;
    z-index:3;
    text-align:center;
    padding-top:30px;
    animation:zoomIn 1s ease;
}

@keyframes zoomIn{
    from{transform:scale(1.3);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.title{
    font-size:45px;
    text-shadow:0 0 40px gold;
}

/* CARDS */
.card{
    margin:20px auto;
    width:80%;
    max-width:800px;
    padding:20px;
    background:rgba(20,15,10,0.75);
    border:1px solid gold;
    border-radius:15px;
    backdrop-filter:blur(10px);
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="bgVideo">
    <source src="https://cdn.coverr.co/videos/coverr-desert-pyramids-at-sunset-6541/1080p.mp4">
</video>

<canvas id="fx"></canvas>
<div class="flash"></div>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h2>⚱ LIMIT GATE ⚱</h2>
        <input type="password" id="pass" placeholder="Enter Code">
        <button onclick="enter()">ENTER REALM</button>
        <p id="msg"></p>
    </div>
</div>

<!-- CONTENT -->
<div id="content">
    <div class="title">👑 PHARAOH LIMIT BREAK</div>

    <div class="card">
        <h3>⚡ GOD MODE ACTIVE</h3>
        <p>Ancient Power Awakening...</p>
    </div>
</div>

<script>
function enter(){
    if(document.getElementById("pass").value==="111991"){
        document.getElementById("login").style.display="none";
        document.getElementById("content").style.display="block";
        startFX();
    }else{
        document.getElementById("msg").innerText="❌ Rejected";
    }
}

/* ===== PARTICLES (SAND STORM) ===== */
function startFX(){
    const c=document.getElementById("fx");
    const x=c.getContext("2d");

    c.width=innerWidth;
    c.height=innerHeight;

    let p=[];

    for(let i=0;i<200;i++){
        p.push({x:Math.random()*c.width,y:Math.random()*c.height,s:Math.random()*3});
    }

    function draw(){
        x.fillStyle="rgba(0,0,0,0.2)";
        x.fillRect(0,0,c.width,c.height);

        x.fillStyle="rgba(255,215,0,0.6)";

        for(let i=0;i<p.length;i++){
            let o=p[i];
            x.fillRect(o.x,o.y,o.s,o.s);

            o.x+=Math.random()*2;
            o.y+=Math.random()*1-0.5;

            if(o.x>c.width)o.x=0;
        }

        requestAnimationFrame(draw);
    }

    draw();
}
</script>

</body>
</html>
