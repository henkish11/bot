<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAT Animated Name System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#1b1b1b,#050505);
font-family:Arial,sans-serif;
color:#fff;
padding:20px;
}

.panel{
width:950px;
max-width:100%;
padding:30px;
border-radius:28px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(18px);
box-shadow:0 0 45px rgba(0,0,0,.6);
text-align:center;
}

h1{
font-size:34px;
margin-bottom:25px;
}

label{
display:block;
margin:12px 0 8px;
font-size:18px;
font-weight:bold;
}

input[type=text]{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:18px;
text-align:center;
outline:none;
}

#glow,
.colors input{
width:100%;
height:60px;
border:none;
border-radius:14px;
cursor:pointer;
background:none;
}

.colors{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-top:10px;
}

button{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:#fff;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.preview{
margin-top:30px;
padding:35px;
border-radius:22px;
background:#000;
box-shadow:inset 0 0 20px rgba(255,255,255,.08);
min-height:180px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

#namePreview{
font-size:72px;
font-weight:900;
letter-spacing:2px;
display:inline-block;
background-size:300% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
color:transparent;
animation:
gradientMove 3s linear infinite,
floatMove 2s ease-in-out infinite;
filter:drop-shadow(0 0 8px rgba(255,255,255,.15));
}

#codeBox{
margin-top:25px;
background:#111;
padding:18px;
border-radius:14px;
font-size:18px;
color:#00ffcc;
word-break:break-all;
min-height:60px;
display:flex;
justify-content:center;
align-items:center;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:300% 50%;}
}

@keyframes floatMove{
0%,100%{transform:translateY(0) scale(1);}
50%{transform:translateY(-10px) scale(1.03);}
}
</style>
</head>
<body>

<div class="panel">
<h1>👑 XAT NAME ENGINE</h1>

<label>Your Name</label>
<input type="text" id="username" value="Ramy">

<label>Glow Color</label>
<input type="color" id="glow" value="#000000">

<label>Choose 5 Gradient Colors</label>
<div class="colors">
<input type="color" value="#7B7CA3">
<input type="color" value="#999acb">
<input type="color" value="#999acb">
<input type="color" value="#B7B8F2">
<input type="color" value="#fcfcf0">
</div>

<button onclick="generate()">🚀 Show Result</button>
<button onclick="copyCode()">📋 Copy Code</button>

<div class="preview">
<div id="namePreview">Ramy</div>
</div>

<div id="codeBox"></div>
</div>

<script>
const nameInput = document.getElementById("username");
const glowInput = document.getElementById("glow");
const colorInputs = document.querySelectorAll(".colors input");
const preview = document.getElementById("namePreview");
const codeBox = document.getElementById("codeBox");

function generate(){
let username = nameInput.value.trim() || "Ramy";
let glow = glowInput.value.replace("#","");
let colors = [...colorInputs].map(c => c.value.replace("#",""));

preview.textContent = username;
preview.style.background = `linear-gradient(90deg,#${colors.join(",#")})`;
preview.style.textShadow = `
0 0 6px #${glow},
0 0 12px #${glow},
0 0 24px #${glow},
0 0 38px #${glow}
`;

codeBox.textContent = `glow#${glow}#grad#r50#o1#${colors.join("#")}`;
}

function copyCode(){
navigator.clipboard.writeText(codeBox.textContent);
alert("Copied 👑");
}

nameInput.addEventListener("keypress",e=>{
if(e.key==="Enter") generate();
});

[nameInput, glowInput, ...colorInputs].forEach(el=>{
el.addEventListener("input",generate);
});

generate();
</script>

</body>
</html>
