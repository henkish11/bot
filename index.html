<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile - BY RAMY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: radial-gradient(circle at top,#010514,#020617);
  color:#fff;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
  z-index:50;
}
.login-box{
  width:300px;
  padding:18px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}
.login-box input{
  width:100%;
  margin:8px 0;
  padding:9px;
  background:#0f172a;
  border:none;
  color:#fff;
  border-radius:8px;
}
.login-box button{
  width:100%;
  padding:9px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:8px;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:8px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:10;
  font-size:13px;
}

.status{color:#38bdf8}

/* MAIN */
.container{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}

.profile{
  width:900px;
  max-width:95%;
  background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  backdrop-filter:blur(18px);
  box-shadow:0 0 50px rgba(0,140,255,0.25);
}

/* TOP */
.top{
  display:flex;
  gap:15px;
  align-items:center;
}

.top img{
  width:100px;
  height:100px;
  border-radius:50%;
  border:2px solid #00c3ff;
}

.name{
  font-size:32px;
  font-weight:700;
  color:#4fc3ff;
}

/* RADIO */
.radio-box{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:6px;
}

.radio-btn{
  padding:6px 12px;
  background:linear-gradient(45deg,#00c3ff,#1e3a8a);
  border:none;
  border-radius:20px;
  cursor:pointer;
  color:#fff;
  font-size:11px;
  box-shadow:0 0 15px rgba(0,195,255,0.4);
}

.volume{
  width:100%;
  margin-top:5px;
}

/* INFO */
.grid{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:15px;
  font-size:13px;
}

/* LINKS */
.world{
  display:block;
  padding:10px;
  border-radius:10px;
  background:rgba(0,195,255,0.1);
  text-decoration:none;
  color:#fff;
  font-size:13px;
  transition:.3s;
}
.world:hover{
  background:rgba(0,195,255,0.25);
  transform:scale(1.02);
}

/* GAME */
.game-box{
  margin-top:25px;
  text-align:center;
}

.game-frame{
  width:420px;
  max-width:100%;
  margin:auto;
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 25px rgba(0,195,255,0.3);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- AUDIO -->
<audio id="radio1" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="radio2" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>
<audio id="radio3" src="https://stream.zeno.fm/w7atxdpk1pdvv"></audio>
<audio id="radio4" src="https://stream.zeno.fm/hswv0qwu7vgtv"></audio>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h3>ACCESS</h3>
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="enter()">Enter</button>

<div class="topbar">
  <div class="status" id="status">⚡ OFFLINE</div>
  <div>BY RAMY</div>

<div class="container">
<div class="profile">

<div class="top">
<img src="https://xatimg.com/image/RKP5IrStF45l.png">

<div>
<div class="name">Ramy</div>

<div class="radio-box">
<button class="radio-btn" onclick="playRadio(1)">🎧 قرآن</button>
<button class="radio-btn" onclick="playRadio(2)">🎶 ميلودي</button>
<button class="radio-btn" onclick="playRadio(3)">🎤 حماقي</button>
<button class="radio-btn" onclick="playRadio(4)">🔥 منوعات</button>
</div>

<input type="range" min="0" max="1" step="0.01" value="1" class="volume" oninput="setVolume(this.value)">

<div style="font-size:12px;margin-top:5px">@iegypt • ID: 106080</div>
</div>
</div>

<div class="grid">
<div class="card">⚡ I love trading on xat website</div>
<div class="card">❤️ I got involved with Dolly ❤️</div>
</div>

<div class="grid">
<a class="world" href="https://xat.com/2ra" target="_blank">🔥 2ra Chat</a>
<a class="world" href="https://xat.com/7reqa" target="_blank">⚡ 7reqa Chat</a>
<a class="world" href="https://xat.com/trade" target="_blank">💰 Trade Hub</a>
<a class="world" href="https://xat.com/cambio" target="_blank">🌐 Cambio Zone</a>
</div>

<!-- GAME -->
<div class="game-box">
  <div class="game-frame">
    <iframe 
      src="https://www.gameflare.com/embed/bubble-shooter/"
      width="100%" 
      height="500"
      frameborder="0"
      scrolling="no">
    </iframe>
  </div>
</div>

</div>
</div>

<script>

/* LOGIN */
function enter(){
  let p=document.getElementById('password').value;
  if(p==="106080"){
    document.getElementById('login').style.display='none';
    document.getElementById('status').innerText='⚡ ONLINE';
  } else {
    alert("Wrong password");
  }
}

/* ENTER KEY */
document.getElementById("password").addEventListener("keydown",e=>{
  if(e.key==="Enter") enter();
});

/* RADIO */
let radios=[
radio1,radio2,radio3,radio4
];

function playRadio(i){
  radios.forEach(r=>{r.pause(); r.currentTime=0;});
  radios[i-1].play();
}

function setVolume(v){
  radios.forEach(r=>r.volume=v);
}

/* BG */
const c=document.getElementById('bg');
const x=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function a(){
  x.clearRect(0,0,c.width,c.height);
  x.fillStyle="#38bdf8";
  p.forEach(o=>{
    x.beginPath();
    x.arc(o.x,o.y,o.r,0,6.28);
    x.fill();
  });
  requestAnimationFrame(a);
}
a();

</script>

</body>
