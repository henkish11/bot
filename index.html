<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SYSTEM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:#0b0c10;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

#login input{
  padding:12px;
  border:none;
  border-radius:10px;
  text-align:center;
}

/* APP */
.app{
  width:900px;
  height:600px;
  display:flex;
  background:#151820;
  border-radius:15px;
  overflow:hidden;
}

.sidebar{
  width:200px;
  background:#0f1117;
  padding:15px;
}

.nav{
  padding:10px;
  margin:10px 0;
  background:#222;
  cursor:pointer;
  border-radius:8px;
  text-align:center;
}

.main{
  flex:1;
  padding:15px;
}

.section{display:none;}
.active{display:block;}

.card{
  background:#222;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

input{
  padding:10px;
  width:100%;
  margin:10px 0;
  border-radius:10px;
  border:none;
  text-align:center;
}
button{
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>RAMY LOGIN</h2>
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<div class="app">

  <div class="sidebar">
    <div class="nav" onclick="show('home')">Search</div>
    <div class="nav" onclick="show('history')">History</div>
  </div>

  <div class="main">

    <!-- SEARCH -->
    <div id="home" class="section active">
      <h3>Search User</h3>
      <input id="searchInput" placeholder="ID or Name">
      <button onclick="searchUser()">Search</button>

      <div class="card">Name: <span id="name"></span></div>
      <div class="card">ID: <span id="uid"></span></div>
      <div class="card">Username: <span id="user"></span></div>
      <div class="card">Avatar: <span id="avatar"></span></div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="section">
      <h3>History</h3>
      <div id="historyBox"></div>
    </div>

  </div>
</div>

<script>

function login(){
  let pass = document.getElementById('pass').value;
  if(pass === "2035"){
    document.getElementById('login').style.display = "none";
  }else{
    alert("Wrong password");
  }
}

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ===== MOCK API (بديل مضمون) ===== */
async function fakeAPI(query){
  return {
    name: "User " + query,
    id: Math.floor(Math.random()*999999),
    username: "user_" + query,
    avatar: "https://via.placeholder.com/100"
  };
}

/* ===== SEARCH ===== */
async function searchUser(){
  let q = document.getElementById('searchInput').value.trim();
  if(!q) return;

  let data;

  try {
    // لو عندك API حقيقي ضيفه هنا لاحقًا
    // let res = await fetch("YOUR_API");
    // data = await res.json();

    data = await fakeAPI(q); // fallback مضمون
  } catch(e){
    data = await fakeAPI(q);
  }

  document.getElementById('name').innerText = data.name;
  document.getElementById('uid').innerText = data.id;
  document.getElementById('user').innerText = data.username;
  document.getElementById('avatar').innerText = data.avatar;

  saveHistory(data);
}

/* ===== HISTORY ===== */
function saveHistory(data){
  let h = JSON.parse(localStorage.getItem("history") || "[]");
  h.push(data);
  localStorage.setItem("history", JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let box = document.getElementById("historyBox");
  let h = JSON.parse(localStorage.getItem("history") || "[]");

  box.innerHTML = h.map(i=>`
    <div class="card">
      ${i.username} - ${i.id}
    </div>
  `).join("");
}

renderHistory();

</script>

</body>
</html>
