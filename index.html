<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHARAOH MAXIMUM REALM</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Cinzel',serif;
    overflow:hidden;
    background:black;
    color:#f5d27a;
}

/* ===== BACKGROUND VIDEO ===== */
#bgVideo{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
    filter:brightness(0.35) contrast(1.4) saturate(1.3);
    transform:scale(1.1);
}

/* ===== LAYERS ===== */
.layer{
    position:fixed;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}

/* smoke */
.smoke{
    background:url('https://i.imgur.com/3VQZQZJ.png');
    opacity:0.05;
    animation:move 25s linear infinite;
}

/* glow */
.glow{
    background:radial-gradient(circle at center,rgba(255,215,0,0.15),transparent 60%);
    animation:pulse 6s infinite alternate;
}

@keyframes move{
    from{transform:translateX(0);}
    to{transform:translateX(-300px);}
}

@keyframes pulse{
    from{transform:scale(1);opacity:0.3;}
    to{transform:scale(1.2);opacity:0.1;}
}

/* ===== LOGIN ===== */
#login{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.portal{
    width:420px;
    padding:40px;
    background:rgba(15,10,5,0.9);
    border:2px solid gold;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 100px rgba(255,215,0,0.5);
    animation:glowBox 2s infinite alternate;
}

@keyframes glowBox{
    from{box-shadow:0 0 30px gold;}
    to{box-shadow:0 0 120px gold;}
}

.portal h2{
    color:gold;
    font-size:26px;
    letter-spacing:5px;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:gold;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:10px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* ===== MAIN ===== */
#content{
    display:none;
    position:relative;
    z-index:5;
    text-align:center;
    padding:25px;
}

/* TITLE */
.title{
    font-size:55px;
    text-shadow:0 0 60px gold;
    margin-bottom:20px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
    max-width:1200px;
    margin:auto;
}

/* CARDS */
.card{
    background:rgba(20,15,10,0.75);
    border:1px solid rgba(255,215,0,0.4);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    box-shadow:0 0 50px rgba(255,215,0,0.15);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-12px) scale(1.03);
    box-shadow:0 0 90px rgba(255,215,0,0.35);
}

.badge{
    display:inline-block;
    padding:6px 12px;
    margin:5px;
    border:1px solid gold;
    border-radius:20px;
    font-size:12px;
}

/* VIDEO */
iframe{
    width:100%;
    height:180px;
    border-radius:14px;
    border:1px solid gold;
}
</style>
</head>

<body>

<!-- CINEMATIC BACKGROUND -->
<video autoplay muted loop id="bgVideo">
    <source src="https://cdn.coverr.co/videos/coverr-pyramids-of-egypt-6036/1080p.mp4">
</video>

<!-- EFFECT LAYERS -->
<div class="layer smoke"></div>
<div class="layer glow"></div>

<!-- LOGIN -->
<div id="login">
    <div class="portal">
        <h2>⚱ PHARAOH GATE ⚱</h2>
        <input type="password" id="pass" placeholder="Enter Divine Code">
        <button onclick="enter()">ENTER REALM</button>
        <p id="msg"></p>
    </div>
</div>

<!-- CONTENT -->
<div id="content">

<div class="title">👑 PHARAOH MAXIMUM REALM</div>

<div class="grid">

    <div class="card">
        <h3>👑 GOD PROFILE</h3>
        <p>Ramy — Pharaoh Supreme Trader</p>
        <p>Status: IMMORTAL ACTIVE</p>

        <span class="badge">GOD MODE</span>
        <span class="badge">VIP</span>
        <span class="badge">LEGEND</span>
    </div>

    <div class="card">
        <h3>🏛 EMPIRE CORE</h3>
        <p>Ancient Market Control System</p>
        <p>Full Trading Dominance</p>
    </div>

    <div class="card">
        <h3>🎬 DIVINE VISION</h3>
        <iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
    </div>

</div>

</div>

<script>
function enter(){
    let p = document.getElementById("pass").value;
    if(p==="111991"){
        document.getElementById("login").style.display="none";
        document.getElementById("content").style.display="block";
    } else {
        document.getElementById("msg").innerText="❌ The Gods Rejected You";
    }
}
</script>

</body>
</html>
