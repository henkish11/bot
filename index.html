<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  background: radial-gradient(circle at top,#0a1f44,#020617);
  color:#fff;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.profile{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:25px;
  padding:25px;
  box-shadow:0 0 40px rgba(0,140,255,0.3);
}
.top{
  display:flex;
  align-items:center;
  gap:20px;
}
.top img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #00c3ff;
}
.name{
  font-size:40px;
  font-weight:700;
  color:#4fc3ff;
}
.user{opacity:.8}
.tabs{
  display:flex;
  gap:10px;
  margin-top:25px;
  flex-wrap:wrap;
}
.tab{
  padding:10px 20px;
  border-radius:10px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  cursor:pointer;
}
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
}
.card h3{margin-bottom:10px;color:#38bdf8}
.gallery img{
  width:100%;
  border-radius:10px;
}
.social i{
  font-size:25px;
  margin-right:10px;
}

@keyframes glow{0%{box-shadow:0 0 10px #38bdf8}50%{box-shadow:0 0 30px #38bdf8,0 0 60px #2563eb}100%{box-shadow:0 0 10px #38bdf8}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
body:before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(56,189,248,.18),transparent 25%),radial-gradient(circle at 80% 30%,rgba(59,130,246,.14),transparent 25%),radial-gradient(circle at 50% 80%,rgba(14,165,233,.12),transparent 25%);pointer-events:none}
.profile{animation:glow 3s infinite ease-in-out}
.top img{animation:floaty 3s ease-in-out infinite}
.tab:hover{transform:translateY(-3px) scale(1.04);transition:.25s;box-shadow:0 10px 25px rgba(14,165,233,.45)}
.card:hover{transform:translateY(-6px);transition:.3s;box-shadow:0 15px 35px rgba(0,140,255,.25)}
.name{text-shadow:0 0 15px rgba(79,195,255,.8)}
</style>
</head>
<body>

<div class="container">
  <div class="profile">

    <div class="top">
      <img src="https://xatimg.com/image/RKP5IrStF45l.png">
      <div>
        <div class="name">Ramy</div>
        <div class="user">@iegypt • ID: (106080)</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab">Info</div>
      <div class="tab">Gallery</div>
      <div class="tab">Powers</div>
      <div class="tab">Social</div>
      <div class="tab">Contact</div>
    </div>

    <div class="grid">

      <div class="card">
        <h3>About Me</h3>
        <p>Welcome to my profile 🔥<br>Professional Xat Designer</p>
      </div>

      <div class="card">
        <h3>Stats</h3>
        <p>Xats: 999999<br>Days: 9999</p>
      </div>

      <div class="card gallery">
        <h3>Gallery</h3>
        <img src="https://i.postimg.cc/BZzwKPJD/bartgif.gif">
      </div>

      <div class="card">
        <h3>Powers</h3>
        <p>Gold • Space • Zap • More...</p>
      </div>

      <div class="card">
        <h3>Social</h3>
        <p>Facebook • Instagram • YouTube</p>
      </div>

      <div class="card">
        <h3>Contact</h3>
        <p>Send me a message 💬</p>
      </div>

    </div>

  </div>
</div>

</body>
</html>
