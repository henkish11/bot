<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT Full Profile Viewer</title>

<style>
body{
  background:#05060a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

input,button{
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

.card{
  margin-top:20px;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  display:inline-block;
  min-width:360px;
  text-align:left;
}

img{
  width:120px;
  border-radius:12px;
  margin:10px 0;
  display:block;
}
.key{
  color:#9ca3af;
  font-size:12px;
}
.value{
  margin-bottom:8px;
  display:block;
}
</style>
</head>

<body>

<h1>🌍 XAT FULL PROFILE VIEW</h1>

<input id="q" placeholder="Search ID or Username">
<button onclick="search()">Search</button>

<div class="card" id="out">No data</div>

<script>

const API = "https://pythbots.com/api/xatprofile.php?u=";

async function search(){
  const q = document.getElementById("q").value.trim();
  if(!q) return;

  document.getElementById("out").innerHTML = "Loading...";

  try{
    const res = await fetch(API + q);
    const d = await res.json();

    render(d);

  }catch(e){
    document.getElementById("out").innerHTML = "❌ Failed to load data";
  }
}

function render(d){

  let html = "";

  for(const key in d){

    let value = d[key];

    // 🖼️ لو صورة
    if(typeof value === "string" &&
      (value.includes(".jpg") || value.includes(".png") || value.includes("http")) &&
      key.toLowerCase().includes("avatar")
    ){
      html += `
        <span class="key">${key}</span>
        <img src="${value}">
      `;
    }
    else if(typeof value === "string" && value.startsWith("http") && key.toLowerCase().includes("image")){
      html += `
        <span class="key">${key}</span>
        <img src="${value}">
      `;
    }
    else{
      html += `
        <span class="key">${key}</span>
        <span class="value">${value}</span>
      `;
    }
  }

  document.getElementById("out").innerHTML = html || "No data found";
}

</script>

</body>
</html>
