<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OMEGA GOD XAT SYSTEM</title>
<style>
body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden;
}

/* GOD OVERLAY */
#godPanel{
position:fixed;
top:20px;
left:20px;
width:320px;
padding:15px;
background:rgba(0,0,0,0.85);
border:1px solid #0ff;
border-radius:12px;
color:#0ff;
z-index:999999;
box-shadow:0 0 20px #0ff;
}

/* TITLE */
h1{
font-size:16px;
text-align:center;
color:#fff;
text-shadow:0 0 10px #0ff;
}

/* INPUT */
input{
width:100%;
padding:8px;
margin-top:5px;
background:black;
border:1px solid #0ff;
color:#0ff;
outline:none;
}

/* BUTTON */
button{
width:100%;
margin-top:8px;
padding:8px;
background:#0ff;
border:none;
cursor:pointer;
font-weight:bold;
}

/* OUTPUT */
#output{
margin-top:10px;
font-size:12px;
white-space:pre-wrap;
color:#0f0;
}

/* XAT OVERLAY EFFECT */
.xatGlow{
text-shadow:0 0 10px #0ff,0 0 20px #0ff;
}
</style>
</head>

<body>

<!-- GOD PANEL -->
<div id="godPanel">
<h1>👑 OMEGA GOD SYSTEM</h1>

<input id="name" placeholder="Enter Name">
<input id="color1" placeholder="Color 1 (hex)">
<input id="color2" placeholder="Color 2 (hex)">

<button onclick="generate()">GENERATE NAMEGRAD</button>
<button onclick="ai()">ASK AI</button>

<div id="output"></div>
</div>

<script>
function generate(){
let name=document.getElementById("name").value;
let c1=document.getElementById("color1").value;
let c2=document.getElementById("color2").value;

let code=`(glow#${c1}#grad#r45#${c1}#${c2})${name}`;

document.getElementById("output").innerText=
"🔥 XAT CODE:\n"+code;
}

function ai(){
let name=document.getElementById("name").value;

let responses=[
"👑 OMEGA ENTITY ACTIVE",
"⚡ POWER LEVEL MAXIMUM",
"🌌 MULTIVERSE LINKED",
"🧠 AI CORE RESPONDING",
"🔥 "+name+" IS NOW ASCENDED"
];

document.getElementById("output").innerText =
responses[Math.floor(Math.random()*responses.length)];
}

/* AUTO INJECT INTO XAT PAGE */
setInterval(()=>{
document.querySelectorAll("b,span,div").forEach(el=>{
if(el.innerText && el.innerText.length<20){
el.classList.add("xatGlow");
}
});
},2000);

</script>

</body>
</html>
