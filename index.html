<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMEGA GOD SYSTEM - TRUE MULTIVERSE ONLINE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:radial-gradient(circle at top,#02010a,#020617);color:#fff;overflow:hidden}
canvas{position:fixed;inset:0;z-index:-3}

/* BOOT SCREEN */
.boot{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  z-index:100;
  flex-direction:column;
}
.boot h1{color:#38bdf8;text-shadow:0 0 20px #38bdf8}
.boot button{
  margin-top:20px;
  padding:10px 20px;
  border:none;border-radius:10px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  color:#fff;cursor:pointer
}

.topbar{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:10px 20px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:10;
}
.status{font-size:12px;color:#38bdf8;text-shadow:0 0 10px #38bdf8}

.container{max-width:1150px;margin:80px auto;padding:20px}
.profile{
  background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  border-radius:25px;border:1px solid rgba(255,255,255,0.1);
  padding:25px;backdrop-filter:blur(18px)
}

.top{display:flex;gap:20px;align-items:center}
.top img{width:120px;height:120px;border-radius:50%;border:3px solid #00c3ff;animation:float 3s infinite}
.name{font-size:40px;color:#4fc3ff;text-shadow:0 0 20px #4fc3ff}

.tabs{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.tab{padding:10px 15px;border-radius:10px;background:#0ea5e9;cursor:pointer}
.tab:hover{transform:scale(1.05)}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:20px}
.card{background:rgba(255,255,255,0.05);padding:15px;border-radius:15px;border:1px solid rgba(255,255,255,0.1)}

.worlds,.panel,.arena{display:none}

.world{padding:15px;border-radius:12px;background:rgba(0,195,255,0.1);cursor:pointer}
.world:hover{box-shadow:0 0 20px #38bdf8}

.sidebar{
  position:fixed;right:10px;top:70px;width:220px;
  background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);
  padding:10px;border-radius:12px;font-size:12px
}

.chat{
  position:fixed;bottom:15px;right:15px;width:260px;
  background:rgba(0,0,0,0.5);border-radius:12px;overflow:hidden
}
.chat-header{padding:8px;background:#0ea5e9}
.chat-msgs{height:140px;overflow-y:auto;padding:10px;font-size:12px}
.chat-input{display:flex}
.chat-input input{flex:1;padding:6px;background:#0f172a;border:none;color:#fff}
.chat-input button{background:#38bdf8;border:none;padding:6px}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- BOOT -->
<div class="boot" id="boot">
  <h1>OMEGA GOD SYSTEM</h1>
  <p>Initializing Multiverse Core...</p>
  <button onclick="start()">ENTER SYSTEM</button>
</div>

<div class="topbar">
  <div class="status" id="status">⚡ OFFLINE</div>
  <div>OMEGA V5</div>
</div>

<div class="container">
  <div class="profile">

    <div class="top">
      <img src="https://xatimg.com/image/RKP5IrStF45l.png">
      <div>
        <div class="name">Ramy</div>
        <div>@iegypt • ID 106080 • XP <span id="xp">0</span></div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab" onclick="show('worlds')">Worlds</div>
      <div class="tab" onclick="show('arena')">Arena</div>
      <div class="tab" onclick="show('panel')">System</div>
    </div>

    <div class="grid worlds" id="worlds">
      <div class="world" onclick="enterWorld('Earth-X')">Earth-X</div>
      <div class="world" onclick="enterWorld('Neo Cairo')">Neo Cairo</div>
      <div class="world" onclick="enterWorld('Void Sector')">Void Sector</div>
    </div>

    <div class="grid arena" id="arena">
      <div class="card">Boss: Void King <button onclick="fight()">Fight</button></div>
    </div>

    <div class="grid panel" id="panel">
      <div class="card">Save System <button onclick="save()">Save</button></div>
      <div class="card">Load System <button onclick="load()">Load</button></div>
      <div class="card">Online Users: <span id="users"></span></div>
    </div>

  </div>
</div>

<div class="sidebar">
  <div>HP: <span id="hp">100</span></div>
  <div>ENERGY: <span id="en">70</span></div>
</div>

<div class="chat">
  <div class="chat-header">MULTIVERSE CHAT</div>
  <div class="chat-msgs" id="msgs"></div>
  <div class="chat-input">
    <input id="msg">
    <button onclick="send()">></button>
  </div>
</div>

<script>
let xp=0,hp=100,en=70;

function start(){
  document.getElementById('boot').style.display='none';
  document.getElementById('status').innerText='⚡ ONLINE';
  fakeUsers();
}

function show(id){
  document.querySelectorAll('.grid').forEach(e=>e.style.display='none');
  document.getElementById(id).style.display='grid';
}

function enterWorld(w){
  alert('Entering '+w);
  xp+=10;update();
}

function fight(){
  xp+=30;hp-=10;update();alert('Boss damaged');
}

function update(){
  document.getElementById('xp').innerText=xp;
  document.getElementById('hp').innerText=hp;
  document.getElementById('en').innerText=en;
}

function save(){
  localStorage.setItem('omega',{xp,hp,en});
  alert('Saved');
}

function load(){
  let d=localStorage.getItem('omega');
  if(d){d=JSON.parse(d);xp=d.xp;hp=d.hp;en=d.en;update();}
}

function fakeUsers(){
  setInterval(()=>{
    document.getElementById('users').innerText=Math.floor(Math.random()*999);
  },1500);
}

function send(){
  let m=document.getElementById('msg');
  if(!m.value)return;
  let d=document.createElement('div');d.textContent='You: '+m.value;
  document.getElementById('msgs').appendChild(d);
  m.value='';
}

// particles
const c=document.getElementById('bg');const x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let p=[];for(let i=0;i<70;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
function a(){x.clearRect(0,0,c.width,c.height);x.fillStyle="#38bdf8";p.forEach(o=>{x.beginPath();x.arc(o.x,o.y,o.r,0,6.28);x.fill();});requestAnimationFrame(a)}a();
</script>

</body>
</html>
