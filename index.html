<!-- XAT Profile Project - Integrated Namegrad Generator Module -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XAT Profile + Namegrad System</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f0f1a;
    color:#fff;
}

.profile{
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
}

/* ===== NAMEGRAD SYSTEM ===== */
.name-container{
    position:relative;
    display:inline-block;
    font-size:28px;
    font-weight:bold;
}

.layer1{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.layer2{
    position:relative;
    text-shadow:0 0 8px #00f;
}

.controls input, .controls select{
    padding:6px;
    margin:5px;
    border-radius:6px;
    border:none;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#4f46e5;
    color:white;
}

.preview{
    margin-top:15px;
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
}
</style>
</head>
<body>

<div class="profile">

    <div class="card">
        <h2>XAT Profile System</h2>
        <p>User: <b>Ramy</b> | ID: 106080 | Username: iegypt</p>
    </div>

    <!-- NAMEGRAD MODULE -->
    <div class="card">
        <h3>Namegrad Generator (Integrated)</h3>

        <div class="controls">
            <input id="text" type="text" value="Ramy" />
            <input id="glow" type="text" value="0000ff" />
            <select id="colors">
                <option value="2">2 Colors</option>
                <option value="3">3 Colors</option>
                <option value="4">4 Colors</option>
            </select>
            <input id="angle" type="number" value="-45" />
            <button onclick="generate()">Generate</button>
        </div>

        <div class="preview">
            <div class="name-container" id="preview">
                <div class="layer1" id="layer1">Ramy</div>
                <div class="layer2" id="layer2">Ramy</div>
            </div>
        </div>

        <p>Generated Code:</p>
        <input id="code" style="width:100%" readonly />
    </div>

</div>

<script>
function generate(){
    let text = document.getElementById('text').value;
    let glow = document.getElementById('glow').value;
    let angle = document.getElementById('angle').value;

    document.getElementById('layer1').innerText = text;
    document.getElementById('layer2').innerText = text;

    let gradient = `repeating-linear-gradient(${angle}deg, #ffffff, #000000)`;

    document.getElementById('layer1').style.backgroundImage = gradient;
    document.getElementById('layer2').style.textShadow = `0 0 10px #${glow}`;

    let code = `(glow#${glow}#grad#r${angle}#------#ffffff)`;
    document.getElementById('code').value = code;
}

generate();
</script>

</body>
</html>
