<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAT Code Order Engine</title>
<style>
body{
margin:0;
background:#0d0d0d;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}
.panel{
width:850px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,.05);
text-align:center;
box-shadow:0 0 35px rgba(0,0,0,.6);
}
input,select,button{
padding:12px;
margin:8px;
border:none;
border-radius:12px;
font-size:16px;
}
.colors{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin:15px 0;
}
.colors input{
height:55px;
padding:0;
}
button{
cursor:pointer;
background:#0072ff;
color:#fff;
font-weight:bold;
}
#name{
font-size:58px;
font-weight:900;
margin:20px 0;
display:inline-block;
background-size:300% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 3s linear infinite;
}
#code{
color:#00ffcc;
word-break:break-all;
margin-top:15px;
font-size:18px;
}
@keyframes move{
0%{background-position:0%}
100%{background-position:300%}
}
</style>
</head>
<body>

<div class="panel">
<h1>👑 XAT ORDER SYSTEM</h1>

<input type="text" id="username" value="Ramy">

<br>
Glow:
<input type="color" id="glow" value="#000000">

Name Color:
<input type="color" id="namecolor" value="#ffffff">

<div class="colors">
<input type="color" value="#7B7CA3">
<input type="color" value="#999acb">
<input type="color" value="#999acb">
<input type="color" value="#B7B8F2">
<input type="color" value="#fcfcf0">
</div>

<select id="order">
<option value="wavefirst">Glow > NameColor > Wave > Grad</option>
<option value="gradfirst">Glow > NameColor > Grad > Wave</option>
</select>

<br>
<button onclick="generate()">🚀 Generate</button>

<div id="name">Ramy</div>
<div id="code"></div>

</div>

<script>
const colors=document.querySelectorAll('.colors input');

function generate(){
let user=document.getElementById("username").value||"Ramy";
let glow=document.getElementById("glow").value.replace("#","");
let namecolor=document.getElementById("namecolor").value.replace("#","");
let vals=[...colors].map(c=>c.value.replace("#",""));
let order=document.getElementById("order").value;

let gradPart=`namegrad#r50#o1#${vals.join("#")}`;
let code="";

if(order==="wavefirst"){
code=`glow#${glow}#namecolor#${namecolor}#namewave#${gradPart}`;
}else{
code=`glow#${glow}#namecolor#${namecolor}#${gradPart}#namewave`;
}

document.getElementById("code").innerText=code;

let show=document.getElementById("name");
show.innerText=user;
show.style.background=`linear-gradient(90deg,#${vals.join(",#")})`;
show.style.textShadow=`0 0 8px #${glow},0 0 18px #${glow}`;
}

document.getElementById("username").addEventListener("keypress",e=>{
if(e.key==="Enter") generate();
});

generate();
</script>

</body>
</html>
