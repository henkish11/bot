<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAT Color Generator</title>

<style>
body{
margin:0;
padding:0;
background:#0d0d0d;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.panel{
width:800px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
box-shadow:0 0 40px rgba(0,0,0,.6);
text-align:center;
}

h1{
margin-bottom:20px;
font-size:32px;
}

input[type=text]{
width:90%;
padding:14px;
font-size:18px;
border:none;
border-radius:12px;
text-align:center;
margin-bottom:15px;
outline:none;
}

.colors{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:20px;
}

.colors input{
height:55px;
border:none;
cursor:pointer;
border-radius:10px;
}

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-weight:bold;
}

.preview{
margin-top:30px;
padding:25px;
background:#000;
border-radius:20px;
min-height:120px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#showName{
font-size:60px;
font-weight:900;
display:inline-block;
background-size:300% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 3s linear infinite;
margin-bottom:20px;
}

#code{
color:#00ffcc;
font-size:18px;
word-break:break-all;
}

@keyframes move{
0%{background-position:0%}
100%{background-position:300%}
}
</style>
</head>
<body>

<div class="panel">
<h1>👑 XAT NAME COLOR SYSTEM</h1>

<input type="text" id="username" placeholder="Write your name" value="Ramy">

<div class="colors">
<input type="color" value="#7B7CA3">
<input type="color" value="#999acb">
<input type="color" value="#999acb">
<input type="color" value="#B7B8F2">
<input type="color" value="#fcfcf0">
</div>

<button onclick="generate()">🚀 Show Result</button>

<div class="preview">
<div id="showName">Ramy</div>
<div id="code">Choose colors then press Enter</div>
</div>

</div>

<script>
const nameInput=document.getElementById("username");
const colorInputs=document.querySelectorAll(".colors input");

function generate(){
let name=nameInput.value || "Ramy";
let colors=[...colorInputs].map(c=>c.value);

let gradient=`linear-gradient(90deg,${colors.join(",")})`;

let showName=document.getElementById("showName");
showName.innerText=name;
showName.style.background=gradient;

let finalCode=`grad#r50#o1#${colors.map(c=>c.replace("#","")).join("#")}`;

document.getElementById("code").innerText=finalCode;
}

nameInput.addEventListener("keypress",function(e){
if(e.key==="Enter"){
generate();
}
});

generate();
</script>

</body>
</html>
