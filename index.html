<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ramy Nexus Cloud</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

.container {
  margin-top: 80px;
}

h1 {
  font-size: 40px;
}

input {
  padding: 10px;
  margin-top: 20px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  margin-left: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #4f46e5;
  color: white;
}

.card {
  margin-top: 40px;
  padding: 20px;
  background: #1a1a1a;
  display: inline-block;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">

  <h1>🌍 Ramy Nexus Cloud</h1>
  <p>Control. Connect. Scale.</p>

  <input id="password" placeholder="Enter Password" />
  <button onclick="login()">Login</button>

  <div class="card" id="output">Waiting login...</div>

</div>

<script>
function login() {
  const pass = document.getElementById("password").value;

  if(pass === "2035") {
    document.getElementById("output").innerHTML =
      "✅ Welcome Admin <br> Dashboard Loaded";
  } else {
    document.getElementById("output").innerHTML =
      "❌ Wrong Password";
  }
}
</script>

</body>
</html>
