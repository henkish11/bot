<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ramy SaaS Platform</title>

<style>
body{
  background:#05060a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

input,button{
  padding:12px;
  border:none;
  border-radius:10px;
  margin:5px;
}

button{
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

.card{
  margin-top:20px;
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  display:inline-block;
  min-width:320px;
  text-align:left;
}

h1{margin-bottom:20px;}
</style>
</head>

<body>

<h1>🌍 RAMY SAAS ANALYTICS</h1>

<!-- SEARCH -->
<input id="search" placeholder="Search ID / Username / Name">
<button onclick="search()">Search</button>

<div id="result" class="card">No data yet</div>

<script>

const API = "http://localhost:5000/api/search?q=";

async function search(){
  const q = document.getElementById("search").value;

  if(!q) return;

  try{
    const res = await fetch(API + q);
    const data = await res.json();

    if(data.length === 0){
      document.getElementById("result").innerHTML = "❌ No results";
      return;
    }

    let html = "";

    data.forEach(u=>{
      html += `
        👤 Name: ${u.name}<br>
        🆔 ID: ${u.id}<br>
        🔖 Username: ${u.username}<br>
        📊 Status: ${u.status}<br>
        🏅 Rank: ${u.rank}<br><br>
      `;
    });

    document.getElementById("result").innerHTML = html;

  }catch(e){
    document.getElementById("result").innerHTML = "❌ API Error";
  }
}

</script>

</body>
</html>
