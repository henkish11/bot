<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GOD ENGINE V3</title>

<style>
body{
  background:#0a0a0a;
  color:#fff;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.container{
  max-width:950px;
  margin:auto;
}

input,button{
  width:95%;
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  background:#6c5ce7;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

#preview{
  font-size:65px;
  margin:25px 0;
  font-weight:bold;
}

/* 🌊 Wave */
.wave span{
  display:inline-block;
  animation:wave 1.2s infinite ease-in-out;
}

@keyframes wave{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* 🔥 Glow effect */
.glow{
  text-shadow:0 0 10px currentColor,0 0 20px currentColor;
}
</style>
</head>

<body>

<div class="container">

<h2>👑 GOD ENGINE V3</h2>

<input id="name" placeholder="Enter Name">

<input id="glow" placeholder="Glow Color (#000000)">

<button onclick="autoColors()">🧠 AUTO AI COLORS</button>

<input id="c1">
<input id="c2">
<input id="c3">
<input id="c4">
<input id="c5">

<button onclick="preview()">⚡ LIVE PREVIEW</button>
<button onclick="generate()">💎 GENERATE XAT CODE</button>
<button onclick="exportCode()">📦 EXPORT FILE</button>

<div id="preview"></div>

<textarea id="output" rows="4" style="width:95%;margin-top:10px;"></textarea>

</div>

<script>

function cols(){
  return [v("c1"),v("c2"),v("c3"),v("c4"),v("c5")];
}

function v(id){
  return document.getElementById(id).value || "#ffffff";
}

/* 🧠 AI COLOR GENERATOR */
function autoColors(){
  let base = ["#7B7CA3","#999acb","#B7B8F2","#fcfcf0","#5f6caf"];

  document.getElementById("c1").value = base[0];
  document.getElementById("c2").value = base[1];
  document.getElementById("c3").value = base[2];
  document.getElementById("c4").value = base[3];
  document.getElementById("c5").value = base[4];
}

function preview(){
  let name = document.getElementById("name").value;
  let box = document.getElementById("preview");
  box.innerHTML = "";

  let c = cols();

  for(let i=0;i<name.length;i++){
    let s = document.createElement("span");
    s.textContent = name[i];
    s.style.color = c[i % c.length];
    box.appendChild(s);
  }

  box.classList.add("wave");
}

function generate(){
  let glow = document.getElementById("glow").value || "#000000";
  let c = cols();

  let code =
`glow#${glow}#grad#r50#o1#${c.join("#")}`;

  document.getElementById("output").value = code;
}

/* 📦 EXPORT SYSTEM */
function exportCode(){
  let data = document.getElementById("output").value;

  let blob = new Blob([data],{type:"text/plain"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "xat_god_export.txt";
  a.click();
}

</script>

</body>
</html>
