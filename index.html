<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT GOD ENGINE</title>

<style>
body{
  background:#0d0d0d;
  color:#fff;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

h2{
  color:#fff;
}

.panel{
  max-width:800px;
  margin:auto;
}

input{
  width:90%;
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  width:90%;
  padding:12px;
  margin:5px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:#6c5ce7;
  color:white;
}

#preview{
  font-size:55px;
  margin:30px 0;
  font-weight:bold;
}

/* 🎭 Wave animation */
.wave span{
  display:inline-block;
  animation:wave 1.2s infinite ease-in-out;
}

@keyframes wave{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}
</style>
</head>

<body>

<div class="panel">

<h2>👑 XAT GOD ENGINE V1</h2>

<input id="name" placeholder="Enter Name">

<input id="glow" placeholder="Glow Color (optional)">

<input id="c1" placeholder="Color 1">
<input id="c2" placeholder="Color 2">
<input id="c3" placeholder="Color 3">
<input id="c4" placeholder="Color 4">
<input id="c5" placeholder="Color 5">

<button onclick="preview()">⚡ Preview Name</button>
<button onclick="generate()">💎 Generate XAT Code</button>

<div id="preview"></div>

<textarea id="output" rows="4" style="width:90%;margin-top:10px;"></textarea>

</div>

<script>

function preview(){
  let name = document.getElementById("name").value;

  let colors = getColors();

  let box = document.getElementById("preview");
  box.innerHTML = "";

  for(let i=0;i<name.length;i++){
    let s = document.createElement("span");
    s.textContent = name[i];

    // 🎨 color per letter
    s.style.color = colors[i % colors.length];

    box.appendChild(s);
  }

  box.classList.add("wave");
}

function generate(){

  let glow = document.getElementById("glow").value || "#000000";

  let colors = getColors();

  let code =
`glow#${glow}#grad#r50#o1#${colors.join("#")}`;

  document.getElementById("output").value = code;
}

function getColors(){
  return [
    val("c1"),
    val("c2"),
    val("c3"),
    val("c4"),
    val("c5")
  ];
}

function val(id){
  return document.getElementById(id).value || "#ffffff";
}

</script>

</body>
</html>
