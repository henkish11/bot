<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Dashboard Fixed</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  min-height:100vh;
  background:#05060a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

body::before{
  content:"RAMY";
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12vw;
  font-weight:900;
  color:rgba(255,255,255,0.05);
  z-index:-1;
}

/* APP */
.app{
  width:100%;
  max-width:1100px;
  height:90vh;
  display:flex;
  background:rgba(255,255,255,0.05);
  border-radius:18px;
  overflow:hidden;
}

.sidebar{
  width:220px;
  padding:15px;
  background:rgba(0,0,0,0.3);
}

.myname{
  text-align:center;
  font-weight:900;
  margin-bottom:20px;
}

.nav{
  padding:12px;
  margin:8px 0;
  text-align:center;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  cursor:pointer;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.section{display:none;}
.active{display:block;}

#login{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
  z-index:999;
}

.box{
  width:320px;
  padding:20px;
  background:#111;
  border-radius:15px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  text-align:center;
}

.card{
  padding:12px;
  margin:10px 0;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  cursor:pointer;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:20px;
  display:block;
  margin:10px auto;
}

#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  color:#000;
  padding:8px 15px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
#toast.show{opacity:1;bottom:40px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>LOGIN</h3>
    <input id="pass" type="password" placeholder="Password"
    onkeydown="if(event.key==='Enter')login()">
  </div>
</div>

<div class="app">

  <div class="sidebar">
    <div class="myname">RAMY</div>
    <div class="nav" onclick="show('home')">Home</div>
    <div class="nav" onclick="show('info')">User Info</div>
    <div class="nav" onclick="show('history')">History</div>
  </div>

  <div class="main">

    <div id="home" class="section active">
      <input id="search" placeholder="Search ID or Name"
      onkeydown="if(event.key==='Enter')searchUser()">
      <button onclick="searchUser()">Search</button>
    </div>

    <div id="info" class="section">
      <img id="avatar" class="avatar">
      <div class="card">Name: <span id="name"></span></div>
      <div class="card">ID: <span id="uid"></span></div>
      <div class="card">Username: <span id="nick"></span></div>
      <div class="card">Image: <span id="img"></span></div>
    </div>

    <div id="history" class="section"></div>

  </div>
</div>

<div id="toast"></div>

<script>

/* 🔥 API الأساسي */
const API_URL = "https://pythbots.com/api/xatprofile.php?u=";

/* 🔥 Proxy لحل CORS (مهم جداً) */
const PROXY = "https://api.allorigins.win/raw?url=";

let historyList = [];

/* NAV */
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* TOAST */
function toast(msg){
  let t=document.getElementById('toast');
  t.innerText=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1200);
}

/* LOGIN (FIXED) */
function login(){
  const passValue = document.getElementById("pass").value.trim();

  if(passValue === "2035"){
    document.getElementById("login").style.display = "none";
    toast("Welcome");
  }else{
    alert("Wrong password");
  }
}

/* 🔥 FIXED API FUNCTION (NO ERRORS) */
async function searchUser(){

  let q = document.getElementById("search").value.trim();
  if(!q) return;

  const url = PROXY + encodeURIComponent(API_URL + q);

  try{

    const res = await fetch(url);

    if(!res.ok){
      throw new Error("Network error");
    }

    const text = await res.text();

    let d;
    try{
      d = JSON.parse(text);
    }catch{
      throw new Error("Invalid JSON");
    }

    document.getElementById("name").innerText = d.name || "N/A";
    document.getElementById("uid").innerText = d.id || "N/A";
    document.getElementById("nick").innerText = d.nick || "N/A";
    document.getElementById("img").innerText = d.avatar || "N/A";
    document.getElementById("avatar").src = d.avatar || "";

    historyList.push(`${d.name || "Unknown"} (${d.id || "0"})`);
    renderHistory();

    show('info');

  }catch(e){
    console.log(e);
    toast("API Error Fixed Mode");
  }
}

/* HISTORY */
function renderHistory(){
  document.getElementById("history").innerHTML =
    historyList.map(h=>`<div class="card">${h}</div>`).join("");
}

</script>

</body>
</html>
