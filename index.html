<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy VIP Profile</title>

<style>
@import url("https://fonts.googleapis.com/css?family=Lora:400,700");

body {
    margin: 0;
    font-family: Lora, serif;
    overflow: hidden;
    color: white;
}

/* ===== PHARAOH BACKGROUND ONLY ===== */
#pharaohBG {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    background: black;
}

/* ===== LOGIN ===== */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(15px);
    z-index: 999;
}

.login-box {
    background: rgba(0,0,0,0.7);
    border: 1px solid #00fff2;
    box-shadow: 0 0 30px #00fff2;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 340px;
}

.login-box h2 {
    color: #00fff2;
}

.login-box input {
    width: 90%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    text-align: center;
}

.login-box button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #00fff2;
    border: none;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

/* ===== MAIN CONTENT ===== */
#content {
    display: none;
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 50px;
}

/* ===== CARD ===== */
.card {
    background: rgba(0,0,0,0.6);
    border: 1px solid #00fff2;
    box-shadow: 0 0 25px #00fff2;
    margin: auto;
    width: 80%;
    max-width: 800px;
    padding: 20px;
    border-radius: 15px;
}

/* ===== VIDEOS ===== */
.videos {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 20px;
}

iframe {
    width: 220px;
    height: 150px;
    border-radius: 10px;
    border: 1px solid #00fff2;
}
</style>
</head>

<body>

<!-- 👑 PHARAOH BACKGROUND -->
<canvas id="pharaohBG"></canvas>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>VIP ACCESS</h2>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="checkPass()">UNLOCK</button>
        <p id="msg" style="color:red;"></p>
    </div>
</div>

<!-- CONTENT -->
<div id="content">

<div class="card">

<h1>Hello, ramy</h1>
<p>I'm xats trader and I love trading</p>

<p>iEgypt (106080) ❤️ DodoLove14 (1541187216)</p>

<p>ramy ❤️ Dodo</p>

<p>Age: 35</p>
<p>Status: Online</p>
<p>VIP Pharaoh Profile</p>

<!-- MUSIC -->
<button onclick="toggleMusic()">Play / Pause Music</button>

<!-- VIDEOS (رجعتهم) -->
<div class="videos">
    <iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
    <iframe src="https://www.youtube.com/embed/b-KFYv7cuxk"></iframe>
    <iframe src="https://www.youtube.com/embed/OoyK4I3DyJ0"></iframe>
</div>

</div>
</div>

<!-- MUSIC -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/4ulSR860HyU?enablejsapi=1"
allow="autoplay"></iframe>

<script>
const correctPass = "111991";

/* LOGIN */
function checkPass() {
    let input = document.getElementById("pass").value;
    if(input === correctPass){
        document.getElementById("login").style.display = "none";
        document.getElementById("content").style.display = "block";
        startPharaoh();
    } else {
        document.getElementById("msg").innerText = "Access Denied!";
    }
}

/* MUSIC */
function toggleMusic(){
    let frame = document.getElementById("music");
    frame.src = frame.src + "&autoplay=1";
}

/* PHARAOH ANIMATION */
function startPharaoh(){
    const canvas = document.getElementById("pharaohBG");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let x = -200;

    function draw(){
        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.shadowBlur = 40;
        ctx.shadowColor = "#d4af37";

        // body
        ctx.fillStyle = "#d4af37";
        ctx.fillRect(x, canvas.height/2 - 100, 80, 160);

        // head
        ctx.fillRect(x+20, canvas.height/2 - 150, 40, 50);

        // eyes scary
        ctx.fillStyle = "red";
        ctx.fillRect(x+25, canvas.height/2 - 130, 5, 5);
        ctx.fillRect(x+45, canvas.height/2 - 130, 5, 5);

        x += 2;

        if(x > canvas.width + 100){
            x = -200;
        }

        requestAnimationFrame(draw);
    }

    draw();
}
</script>

</body>
</html>
