<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iegypt Spotify Arabic</title>

<style>
body{
margin:0;
font-family:Segoe UI,Arial;
background:url('https://xatimg.com/image/PKE63yJ4Y6Q9.jpg') center/cover fixed;
color:#fff;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
}

.player{
position:relative;
max-width:500px;
margin:80px auto;
background:rgba(0,0,0,0.6);
border:1px solid #0af;
border-radius:20px;
padding:20px;
box-shadow:0 0 30px #0af;
}

h1{
text-align:center;
color:#0af;
}

.song{
padding:10px;
margin:8px 0;
background:rgba(255,255,255,0.1);
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.song:hover{
background:#0af;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#0af;
color:#fff;
}

.info{
text-align:center;
margin-top:10px;
color:#ffd700;
}
</style>

</head>
<body>

<div class="overlay"></div>

<div class="player">

<h1>🎧 Spotify Arabic - iegypt</h1>

<div id="list"></div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶ / ⏸</button>
<button onclick="next()">⏭</button>
</div>

<div class="info" id="now">لا يوجد تشغيل</div>

<audio id="audio"></audio>

</div>

<script>

const playlist = [
{
name:"محمد فؤاد - الحب الحقيقي",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},
{
name:"محمد فؤاد - حبيبي يا",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
},
{
name:"محمد فؤاد - خدني الحنين",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
},
{
name:"محمد فؤاد - لو على قلبي",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
},
{
name:"محمد فؤاد - ساعات بشتاق",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"
}
];

let index = 0;
const audio = document.getElementById("audio");

function load(i){
audio.src = playlist[i].url;
audio.play();
document.getElementById("now").innerText = playlist[i].name;
}

function toggle(){
if(audio.paused){
load(index);
}else{
audio.pause();
}
}

function next(){
index = (index+1)%playlist.length;
load(index);
}

function prev(){
index = (index-1+playlist.length)%playlist.length;
load(index);
}

const list = document.getElementById("list");

playlist.forEach((s,i)=>{
let div = document.createElement("div");
div.className="song";
div.innerText = s.name;
div.onclick = ()=>{index=i;load(i);};
list.appendChild(div);
});

</script>

</body>
</html>
