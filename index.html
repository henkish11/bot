<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&display=swap');

body{
    margin:0;
    font-family:'Cinzel',serif;
    overflow:hidden;
    color:#f5d27a;
}

/* ===== VIDEO BACKGROUND (FIXED) ===== */
#bgVideo{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
    filter:brightness(0.40) contrast(1.2) saturate(1.1);
}

/* DARK OVERLAY FOR READABILITY */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:1;
}

/* ===== LOGIN ===== */
#login{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.box{
    width:360px;
    padding:30px;
    background:rgba(20,15,10,0.85);
    border:2px solid gold;
    border-radius:18px;
    text-align:center;
    box-shadow:0 0 60px rgba(255,215,0,0.4);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    background:gold;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:10px;
}

/* ===== MAIN CONTENT ===== */
#content{
    display:none;
    position:relative;
    z-index:2;
    text-align:center;
    padding-top:40px;
}

/* TITLE */
.title{
    font-size:40px;
    text-shadow:0 0 30px gold;
    margin-bottom:20px;
}

/* CARD */
.card{
    margin:20px auto;
    width:85%;
    max-width:850px;
    padding:22px;
    background:rgba(25,18,10,0.75);
    border:1px solid rgba(255,215,0,0.4);
    border-radius:18px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px rgba(255,215,0,0.15);
}

/* BADGES */
.badge{
    display:inline-block;
    padding:6px 12px;
    margin:5px;
    border:1px solid gold;
    border-radius:20px;
    font-size:12px;
}

/* VIDEOS */
.videos{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

iframe{
    width:200px;
    height:140px;
    border-radius:12px;
    border:1px solid gold;
}
</style>
</head>

</body>
</html>
