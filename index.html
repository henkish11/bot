<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy VIP Profile</title>

<style>
@import url("https://fonts.googleapis.com/css?family=Lora:400,700");

body {
    margin: 0;
    font-family: Lora, serif;
    overflow: hidden;
    color: white;
}

/* ===== PHARAOH CANVAS BACKGROUND ===== */
#pharaohBG {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    background: black;
}

/* ===== MATRIX ===== */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}

/* ===== LOGIN ===== */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(15px);
    z-index: 999;
}

.login-box {
    background: rgba(0,0,0,0.7);
    border: 1px solid #00fff2;
    box-shadow: 0 0 30px #00fff2;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 340px;
}

.login-box h2 {
    color: #00fff2;
}

.login-box input {
    width: 90%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    text-align: center;
}

.login-box button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #00fff2;
    border: none;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

/* ===== MAIN CONTENT ===== */
#content {
    display: none;
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 50px;
}

/* ===== CARD ===== */
.card {
    background: rgba(0,0,0,0.6);
    border: 1px solid #00fff2;
    box-shadow: 0 0 25px #00fff2;
    margin: auto;
    width: 80%;
    max-width: 800px;
    padding: 20px;
    border-radius: 15px;
}
</style>
</head>

<body>

<!-- 👑 PHARAOH BACKGROUND -->
<canvas id="pharaohBG"></canvas>

<!-- MATRIX -->
<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>VIP ACCESS</h2>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="checkPass()">UNLOCK</button>
        <p id="msg" style="color:red;"></p>
    </div>
</div>

<!-- CONTENT -->
<div id="content">
<div class="card">

<h1>Hello, ramy</h1>
<p>VIP Pharaoh Hacker Profile</p>

</div>
</div>

<script>
const correctPass = "111991";

/* LOGIN */
function checkPass() {
    let input = document.getElementById("pass").value;
    if(input === correctPass){
        document.getElementById("login").style.display = "none";
        document.getElementById("content").style.display = "block";
        startMatrix();
        startPharaoh();
    } else {
        document.getElementById("msg").innerText = "Access Denied!";
    }
}

/* MATRIX */
function startMatrix(){
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let letters = "01PHARAOHVIP".split("");
    let fontSize = 14;
    let columns = canvas.width / fontSize;
    let drops = [];

    for(let i=0;i<columns;i++) drops[i]=1;

    function draw(){
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle = "#00fff2";
        ctx.font = fontSize+"px monospace";

        for(let i=0;i<drops.length;i++){
            let text = letters[Math.floor(Math.random()*letters.length)];
            ctx.fillText(text,i*fontSize,drops[i]*fontSize);

            if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
                drops[i]=0;
            }
            drops[i]++;
        }
    }
    setInterval(draw,33);
}

/* PHARAOH ANIMATION */
function startPharaoh(){
    const canvas = document.getElementById("pharaohBG");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let x = -200;

    function draw(){
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.shadowBlur = 30;
        ctx.shadowColor = "#d4af37";

        ctx.fillStyle = "#d4af37";

        // body
        ctx.fillRect(x, canvas.height/2 - 100, 80, 160);

        // head
        ctx.fillRect(x+20, canvas.height/2 - 150, 40, 50);

        // eyes
        ctx.fillStyle = "red";
        ctx.fillRect(x+25, canvas.height/2 - 130, 5, 5);
        ctx.fillRect(x+45, canvas.height/2 - 130, 5, 5);

        x += 2;

        if(x > canvas.width + 100){
            x = -200;
        }

        requestAnimationFrame(draw);
    }

    draw();
}
</script>

</body>
</html>
