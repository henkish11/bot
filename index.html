<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile - GOD SYSTEM V4 FINAL ASCENSION</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: radial-gradient(circle at top,#01010a,#020617);
  color:#fff;
  overflow:hidden;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-3;
}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:10;
}

.status{
  font-size:12px;
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8;
}

.container{max-width:1150px;margin:80px auto;padding:20px}

.profile{
  background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  border:1px solid rgba(255,255,255,0.1);
  border-radius:25px;
  padding:25px;
  backdrop-filter:blur(18px);
  box-shadow:0 0 90px rgba(0,140,255,0.25);
}

.top{display:flex;gap:20px;align-items:center}
.top img{
  width:130px;height:130px;border-radius:50%;border:3px solid #00c3ff;
  animation:float 3s infinite ease-in-out;
}

.name{font-size:42px;color:#4fc3ff;text-shadow:0 0 20px rgba(79,195,255,0.8)}

.tabs{display:flex;gap:10px;margin-top:25px;flex-wrap:wrap}
.tab{padding:10px 18px;border-radius:10px;background:linear-gradient(45deg,#0ea5e9,#1e3a8a);cursor:pointer;transition:.3s}
.tab:hover{transform:scale(1.05);box-shadow:0 0 20px #38bdf8}
.tab.active{box-shadow:0 0 25px #38bdf8}

.grid{margin-top:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);transition:.3s}
.card:hover{transform:translateY(-6px);box-shadow:0 0 25px rgba(0,140,255,0.3)}

/* HUD */
.hud{
  position:fixed;
  top:50px;
  left:20px;
  width:220px;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  padding:10px;
  font-size:12px;
}

.bar{
  width:100%;height:8px;background:#0f172a;border-radius:10px;margin:5px 0
}
.fill{
  height:100%;background:linear-gradient(90deg,#38bdf8,#2563eb);width:50%
}

/* SKILL TREE */
.skills{
  display:none;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}
.skill{
  padding:15px;
  border-radius:12px;
  background:rgba(0,195,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}
.skill:hover{box-shadow:0 0 25px #38bdf8}

/* BOSS */
.boss{
  display:none;
}
.boss-card{
  padding:20px;
  border-radius:15px;
  background:rgba(255,0,80,0.08);
  border:1px solid rgba(255,0,80,0.3);
}

.btn{
  padding:8px 12px;border:none;border-radius:10px;cursor:pointer;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);color:#fff
}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="topbar">
  <div class="status" id="status">⚡ ASCENSION CORE: STABLE</div>
  <div>GOD SYSTEM V4</div>
</div>

<div class="hud">
  <div>HP</div>
  <div class="bar"><div class="fill" id="hp" style="width:100%"></div></div>
  <div>ENERGY</div>
  <div class="bar"><div class="fill" id="en" style="width:70%"></div></div>
  <div>XP: <span id="xp">0</span></div>
</div>

<div class="container">
  <div class="profile">

    <div class="top">
      <img src="https://xatimg.com/image/RKP5IrStF45l.png">
      <div>
        <div class="name">Ramy</div>
        <div>@iegypt • ID: 106080 • ASCENDED</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="show('main')">Core</div>
      <div class="tab" onclick="show('skills')">Skills</div>
      <div class="tab" onclick="show('boss')">Boss</div>
    </div>

    <div class="grid" id="main">
      <div class="card">🌌 MULTIVERSE CORE ACTIVE</div>
      <div class="card"><button class="btn" onclick="gainXP(10)">Gain XP</button></div>
    </div>

    <div class="skills" id="skills">
      <div class="skill" onclick="unlock('Time Control')">⏳ Time Control</div>
      <div class="skill" onclick="unlock('Reality Shift')">🌌 Reality Shift</div>
      <div class="skill" onclick="unlock('Energy Burst')">⚡ Energy Burst</div>
    </div>

    <div class="boss" id="boss">
      <div class="boss-card">
        <h3>FINAL BOSS: VOID KING</h3>
        <p>Power: 9999</p>
        <button class="btn" onclick="fightBoss()">Fight</button>
      </div>
    </div>

  </div>
</div>

<script>
let xp=0,hp=100,en=70;
let skills=[];

function show(id){
  document.querySelectorAll('.grid,.skills,.boss').forEach(e=>e.style.display='none');
  document.getElementById(id).style.display=(id==='main')?'grid':'grid';
  if(id==='boss')document.getElementById(id).style.display='block';
}

function gainXP(v){
  xp+=v;
  document.getElementById('xp').innerText=xp;
  en=Math.min(100,en+5);
  document.getElementById('en').style.width=en+'%';
  document.getElementById('status').innerText="⚡ ASCENSION XP: "+xp;
}

function unlock(s){
  if(!skills.includes(s)){
    skills.push(s);
    alert('Unlocked '+s);
  }
}

function fightBoss(){
  if(xp>50){
    alert('VOID KING DEFEATED - ASCENSION COMPLETE');
    document.getElementById('hp').style.width='0%';
  }else{
    alert('Not strong enough');
    hp-=20;
    document.getElementById('hp').style.width=hp+'%';
  }
}

// particles
const c=document.getElementById('bg');const x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let p=[];
for(let i=0;i<80;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2,dx:(Math.random()-0.5),dy:(Math.random()-0.5)});
function a(){x.clearRect(0,0,c.width,c.height);x.fillStyle="#38bdf8";p.forEach(o=>{x.beginPath();x.arc(o.x,o.y,o.r,0,6.28);x.fill();o.x+=o.dx;o.y+=o.dy;if(o.x<0||o.x>c.width)o.dx*=-1;if(o.y<0||o.y>c.height)o.dy*=-1});requestAnimationFrame(a)}a();
</script>

</body>
</html>
