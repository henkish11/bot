<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMEGA FINAL REALITY ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  background:radial-gradient(circle at top,#02010a,#020617);
  color:#fff;
  overflow:hidden;
}
canvas{position:fixed;inset:0;z-index:-3}

/* BOOT + LOADING */
.boot{
  position:fixed;inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.9);
  z-index:100;
}
.boot h1{
  color:#38bdf8;
  text-shadow:0 0 20px #38bdf8;
}
.loader{
  width:200px;height:4px;background:#0f172a;margin-top:20px;overflow:hidden;border-radius:10px
}
.loader div{
  width:40%;height:100%;background:linear-gradient(90deg,#38bdf8,#2563eb);
  animation:load 1.2s infinite
}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}
}

.topbar{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:10px 20px;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(12px);
  z-index:10;
}
.status{font-size:12px;color:#38bdf8;text-shadow:0 0 10px #38bdf8}

.container{max-width:1200px;margin:80px auto;padding:20px}

.profile{
  background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.1);
  padding:25px;
  backdrop-filter:blur(18px);
  box-shadow:0 0 100px rgba(0,140,255,0.25);
}

.top{display:flex;gap:20px;align-items:center}
.top img{width:120px;height:120px;border-radius:50%;border:3px solid #00c3ff;animation:float 3s infinite}
.name{font-size:42px;color:#4fc3ff;text-shadow:0 0 25px #4fc3ff}

.tabs{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.tab{padding:10px 16px;border-radius:10px;background:#0ea5e9;cursor:pointer;transition:.2s}
.tab:hover{transform:scale(1.05)}
.tab.active{box-shadow:0 0 20px #38bdf8}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:20px}
.card{background:rgba(255,255,255,0.05);padding:15px;border-radius:15px;border:1px solid rgba(255,255,255,0.1)}

/* REALITY ENGINE */
.worlds,.arena,.panel,.multiplayer{display:none}
.world{padding:15px;border-radius:12px;background:rgba(0,195,255,0.1);cursor:pointer}
.world:hover{box-shadow:0 0 25px #38bdf8}

/* HUD */
.hud{
  position:fixed;left:10px;top:70px;width:220px;
  background:rgba(0,0,0,0.4);
  padding:10px;border-radius:12px;font-size:12px
}
.bar{height:6px;background:#0f172a;border-radius:10px;margin:6px 0}
.fill{height:100%;background:linear-gradient(90deg,#38bdf8,#2563eb)}

/* MULTIPLAYER */
.player{
  padding:10px;border-radius:10px;
  background:rgba(255,255,255,0.05);
  margin-bottom:10px
}

.chat{
  position:fixed;bottom:15px;right:15px;width:260px;
  background:rgba(0,0,0,0.55);border-radius:12px;overflow:hidden
}
.chat-header{padding:8px;background:#0ea5e9}
.chat-msgs{height:140px;overflow-y:auto;padding:10px;font-size:12px}
.chat-input{display:flex}
.chat-input input{flex:1;padding:6px;background:#0f172a;border:none;color:#fff}
.chat-input button{background:#38bdf8;border:none;padding:6px}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="boot" id="boot">
  <h1>OMEGA FINAL REALITY ENGINE</h1>
  <p>Booting Multiverse Kernel...</p>
  <div class="loader"><div></div></div>
  <button onclick="start()" style="margin-top:20px;padding:10px 20px;background:#0ea5e9;border:none;color:#fff;border-radius:10px">ENTER REALITY</button>
</div>

<div class="topbar">
  <div class="status" id="status">⚡ OFFLINE REALITY</div>
  <div>OMEGA ENGINE V6</div>
</div>

<div class="hud">
  HP <div class="bar"><div class="fill" id="hp" style="width:100%"></div></div>
  ENERGY <div class="bar"><div class="fill" id="en" style="width:70%"></div></div>
  XP: <span id="xp">0</span>
  <br>PLAYERS: <span id="players">0</span>
</div>

<div class="container">
  <div class="profile">

    <div class="top">
      <img src="https://xatimg.com/image/RKP5IrStF45l.png">
      <div>
        <div class="name">Ramy</div>
        <div>@iegypt • REALITY NODE ACTIVE</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab" onclick="show('worlds')">Worlds</div>
      <div class="tab" onclick="show('arena')">Arena</div>
      <div class="tab" onclick="show('multi')">Multiplayer</div>
      <div class="tab" onclick="show('panel')">System</div>
    </div>

    <div class="grid worlds" id="worlds">
      <div class="world" onclick="enter('Earth-X')">Earth-X</div>
      <div class="world" onclick="enter('Neo Cairo')">Neo Cairo</div>
      <div class="world" onclick="enter('Void Sector')">Void Sector</div>
    </div>

    <div class="arena" id="arena">
      <div class="card">Boss: REALITY KING <button onclick="fight()">Fight</button></div>
    </div>

    <div class="multiplayer" id="multi">
      <div class="player">Player_Alpha</div>
      <div class="player">Cyber_Rival</div>
      <div class="player">Void_User</div>
    </div>

    <div class="panel" id="panel">
      <div class="card"><button onclick="save()">Save Reality</button></div>
      <div class="card"><button onclick="load()">Load Reality</button></div>
    </div>

  </div>
</div>

<div class="chat">
  <div class="chat-header">REALITY CHAT</div>
  <div class="chat-msgs" id="msgs"></div>
  <div class="chat-input">
    <input id="msg">
    <button onclick="send()">></button>
  </div>
</div>

<script>
let xp=0,hp=100,en=70;

function start(){
  document.getElementById('boot').style.display='none';
  document.getElementById('status').innerText='⚡ REALITY ONLINE';
  simulatePlayers();
}

function show(id){
  document.querySelectorAll('.worlds,.arena,.panel,.multiplayer').forEach(e=>e.style.display='none');
  document.getElementById(id).style.display='grid';
}

function enter(w){
  xp+=15;update();alert('Entering '+w);
}

function fight(){
  xp+=40;hp-=15;update();alert('Reality Boss Damaged');
}

function update(){
  document.getElementById('xp').innerText=xp;
  document.getElementById('hp').style.width=hp+'%';
  document.getElementById('en').style.width=en+'%';
}

function save(){
  localStorage.setItem('omega_v6',JSON.stringify({xp,hp,en}));
}

function load(){
  let d=JSON.parse(localStorage.getItem('omega_v6')||'{}');
  xp=d.xp||0;hp=d.hp||100;en=d.en||70;update();
}

function simulatePlayers(){
  setInterval(()=>{
    document.getElementById('players').innerText=Math.floor(Math.random()*9999);
  },1200);
}

function send(){
  let m=document.getElementById('msg');
  if(!m.value)return;
  let d=document.createElement('div');
  d.textContent='You: '+m.value;
  document.getElementById('msgs').appendChild(d);
  m.value='';
}

// particles
const c=document.getElementById('bg');const x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let p=[];for(let i=0;i<90;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
function a(){x.clearRect(0,0,c.width,c.height);x.fillStyle="#38bdf8";p.forEach(o=>{x.beginPath();x.arc(o.x,o.y,o.r,0,6.28);x.fill();});requestAnimationFrame(a)}a();
</script>

</body>
</html>
