<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT Namegrad Generator - STAGE 1</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
border:1px solid #ddd;
}

input, select{
width:100%;
padding:6px;
}

.preview{
margin-top:20px;
padding:15px;
background:#eee;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 XAT Namegrad Generator (STAGE 1)</h1>

<table>
<tr>
<td>Text:</td>
<td><input id="text" value="FEXBots"></td>
</tr>

<tr>
<td>Color 1:</td>
<td><input id="c1" value="000000"></td>
</tr>

<tr>
<td>Color 2:</td>
<td><input id="c2" value="ffffff"></td>
</tr>

<tr>
<td>Rotation:</td>
<td><input id="rot" value="-45"></td>
</tr>
</table>

<button onclick="nextStage()">⚡ Generate Stage 2</button>

<div class="preview">
PREVIEW WILL APPEAR HERE IN STAGE 2
</div>

</div>

<script>
function nextStage(){
let data={
text:document.getElementById("text").value,
c1:document.getElementById("c1").value,
c2:document.getElementById("c2").value,
rot:document.getElementById("rot").value
};

localStorage.setItem("xat_data",JSON.stringify(data));

window.location.href="stage2.html";
}
</script>

</body>
</html>
