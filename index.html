<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* LOGIN */
.login-box{
  width:320px;
  margin:120px auto;
  background:#111827;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  width:95%;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4f46e5;
  color:white;
}

/* DASHBOARD */
.sidebar{
  width:200px;
  height:100vh;
  background:#111827;
  position:fixed;
  padding:20px;
  display:none;
}

.main{
  margin-left:220px;
  padding:20px;
  display:none;
}

.card{
  background:#1f2937;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.logout{
  background:red;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>Login</h2>
  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="sidebar" id="sidebar">
  <h3>Panel</h3>
  <p>Dashboard</p>
  <p>User Info</p>
</div>

<div class="main" id="main">
  <h1>Dashboard</h1>

  <div class="card" id="userinfo"></div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
// ===== FAKE USER DATABASE =====
const userDB = {
  username: "ramy",
  password: "1234",
  role: "admin",
  powers: 120,
  chats: 9
};

// ===== LOGIN =====
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === userDB.username && p === userDB.password){

    localStorage.setItem("user", JSON.stringify(userDB));

    showDashboard();

  } else {
    alert("Wrong login ❌");
  }
}

// ===== SHOW DASHBOARD =====
function showDashboard(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("sidebar").style.display = "block";
  document.getElementById("main").style.display = "block";

  const user = JSON.parse(localStorage.getItem("user"));

  document.getElementById("userinfo").innerHTML = `
    <h3>User Info</h3>
    <p>Username: ${user.username}</p>
    <p>Role: ${user.role}</p>
    <p>Powers: ${user.powers}</p>
    <p>Chats: ${user.chats}</p>
  `;
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// ===== AUTO LOGIN IF EXISTS =====
window.onload = function(){
  if(localStorage.getItem("user")){
    showDashboard();
  }
}
</script>

</body>
</html>
