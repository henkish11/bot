<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY SEARCH SYSTEM</title>

<style>
body{
  background:#0b0c10;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.app{
  width:900px;
  background:#151820;
  padding:20px;
  border-radius:15px;
}

input,button{
  padding:12px;
  border:none;
  border-radius:10px;
  margin:5px 0;
  width:100%;
}

.card{
  background:#222;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<h2>RAMY SEARCH</h2>

<input id="q" placeholder="Search ID or Name">
<button onclick="search()">Search</button>

<div class="card">Name: <span id="name"></span></div>
<div class="card">Country: <span id="country"></span></div>
<div class="card">City: <span id="city"></span></div>
<div class="card">Info: <span id="info"></span></div>

</div>

<script>

/* ===== SEARCH FUNCTION ===== */
async function search(){

  let q = document.getElementById("q").value.trim();
  if(!q) return;

  try {

    /* 🔥 API حقيقي مجاني (Random User API) */
    let res = await fetch("https://randomuser.me/api/");
    let data = await res.json();

    let user = data.results[0];

    document.getElementById("name").innerText =
      user.name.first + " " + user.name.last;

    document.getElementById("country").innerText =
      user.location.country;

    document.getElementById("city").innerText =
      user.location.city;

    document.getElementById("info").innerText =
      "Generated for: " + q;

  } catch(e){

    /* 🔥 Fallback لو API وقع */
    document.getElementById("name").innerText = "User " + q;
    document.getElementById("country").innerText = "Unknown";
    document.getElementById("city").innerText = "Unknown";
    document.getElementById("info").innerText = "Offline Mode";
  }
}

</script>

</body>
</html>
