<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ramy Analytics GitHub</title>

<style>
body{
  background:#0d0d0d;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

input{
  padding:12px;
  width:260px;
  border-radius:8px;
  border:none;
}

button{
  padding:12px 18px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.card{
  margin-top:20px;
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  display:inline-block;
  min-width:280px;
}
</style>
</head>

<body>

<h1>🌍 GitHub Analytics System</h1>

<input id="search" placeholder="Search ID or Name">
<button onclick="search()">Search</button>

<div id="result" class="card">No data yet</div>

<script>
// 🧠 البيانات داخل GitHub (بدون سيرفر)
const users = [
  {id:"1001", name:"Ramy", status:"Online", visits:15},
  {id:"1002", name:"Ahmed", status:"Offline", visits:8},
  {id:"1003", name:"Sara", status:"Busy", visits:21},
  {id:"2001", name:"Moon", status:"Online", visits:30}
];

function search(){
  const q = document.getElementById("search").value.toLowerCase();

  const found = users.filter(u =>
    u.id.includes(q) || u.name.toLowerCase().includes(q)
  );

  let output="";

  if(found.length === 0){
    output="❌ No user found";
  } else {
    found.forEach(u=>{
      output += `
        👤 Name: ${u.name}<br>
        🆔 ID: ${u.id}<br>
        📊 Status: ${u.status}<br>
        🔥 Visits: ${u.visits}<br><br>
      `;
    });
  }

  document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
