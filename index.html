<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egypt VIP Profile</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    color: white;
    background: black;
}

/* ===== CANVAS BACKGROUND ===== */
#egyptBG {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* ===== LOGIN ===== */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
    z-index: 10;
}

.box {
    padding: 20px;
    background: rgba(0,0,0,0.7);
    border: 1px solid gold;
    border-radius: 10px;
    text-align: center;
}

input {
    padding: 10px;
    width: 200px;
    text-align: center;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    background: gold;
    border: none;
    font-weight: bold;
}

/* ===== CONTENT ===== */
#content {
    display: none;
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 40px;
}

.card {
    margin: auto;
    width: 80%;
    max-width: 700px;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    border: 1px solid gold;
    border-radius: 15px;
}

/* videos */
iframe {
    width: 200px;
    height: 140px;
    margin: 5px;
    border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="egyptBG"></canvas>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h3>VIP ACCESS</h3>
        <input type="password" id="pass" placeholder="password">
        <button onclick="login()">ENTER</button>
        <p id="msg"></p>
    </div>
</div>

<!-- CONTENT -->
<div id="content">
    <div class="card">
        <h1>👑 RAMY EGYPT PROFILE</h1>

        <p>Pharaoh Trader | VIP User</p>
        <p>Egyptian Power Activated ⚡</p>

        <div>
            <iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
            <iframe src="https://www.youtube.com/embed/b-KFYv7cuxk"></iframe>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("egyptBG");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pharaohX = -200;
let mummyX = canvas.width + 200;

/* ===== LOGIN ===== */
function login(){
    let pass = document.getElementById("pass").value;
    if(pass === "111991"){
        document.getElementById("login").style.display = "none";
        document.getElementById("content").style.display = "block";
        animate();
    } else {
        document.getElementById("msg").innerText = "Wrong password";
    }
}

/* ===== DRAW BACKGROUND ===== */
function drawBackground(){
    let grd = ctx.createLinearGradient(0,0,0,canvas.height);
    grd.addColorStop(0,"#000");
    grd.addColorStop(0.5,"#1a1200");
    grd.addColorStop(1,"#000");

    ctx.fillStyle = grd;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // pyramids
    ctx.fillStyle = "#3b2a14";
    ctx.beginPath();
    ctx.moveTo(200,500);
    ctx.lineTo(400,200);
    ctx.lineTo(600,500);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(500,520);
    ctx.lineTo(700,250);
    ctx.lineTo(900,520);
    ctx.fill();
}

/* ===== PHARAOH ===== */
function drawPharaoh(){
    ctx.fillStyle = "#d4af37";
    ctx.fillRect(pharaohX, canvas.height/2, 60, 120);

    ctx.fillRect(pharaohX+15, canvas.height/2-40, 30, 40);

    ctx.fillStyle = "red";
    ctx.fillRect(pharaohX+20, canvas.height/2-25, 5, 5);
}

/* ===== MUMMY ===== */
function drawMummy(){
    ctx.fillStyle = "#d9d9d9";
    ctx.fillRect(mummyX, canvas.height/2+50, 50, 100);

    ctx.fillStyle = "black";
    ctx.fillRect(mummyX+10, canvas.height/2+70, 8, 8);
    ctx.fillRect(mummyX+30, canvas.height/2+70, 8, 8);
}

/* ===== ANIMATION LOOP ===== */
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBackground();

    drawPharaoh();
    drawMummy();

    pharaohX += 2;
    mummyX -= 2;

    if(pharaohX > canvas.width + 100){
        pharaohX = -200;
    }

    if(mummyX < -200){
        mummyX = canvas.width + 200;
    }

    requestAnimationFrame(animate);
}
</script>

</body>
</html>
