<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAT Name Effects</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
font-family:Arial;
}

.box{
width:750px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
text-align:center;
box-shadow:0 0 35px rgba(0,0,0,.5);
color:white;
}

h1{
margin-bottom:20px;
}

input[type=text]{
width:90%;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
text-align:center;
margin-bottom:15px;
}

.colors{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:15px;
}

.colors input{
height:55px;
border:none;
cursor:pointer;
}

.preview{
margin-top:25px;
padding:30px;
background:#000;
border-radius:20px;
}

#name{
font-size:60px;
font-weight:900;
display:inline-block;
background-size:300% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
color:transparent;
animation:move 3s linear infinite,wave 1s ease-in-out infinite;
}

.output{
margin-top:20px;
padding:15px;
background:#111;
border-radius:12px;
color:#00ffcc;
word-break:break-all;
}

@keyframes move{
0%{background-position:0%}
100%{background-position:300%}
}

@keyframes wave{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}
</style>
</head>
<body>

<div class="box">
<h1>👑 XAT NAME ENGINE</h1>

<input type="text" id="username" value="Ramy">

<div class="colors">
<input type="color" value="#7B7CA3">
<input type="color" value="#999acb">
<input type="color" value="#999acb">
<input type="color" value="#B7B8F2">
<input type="color" value="#fcfcf0">
</div>

<div class="preview">
<div id="name">Ramy</div>
</div>

<div class="output" id="code"></div>
</div>

<script>
const nameInput=document.getElementById("username");
const nameText=document.getElementById("name");
const code=document.getElementById("code");
const colors=document.querySelectorAll(".colors input");

function update(){
let txt=nameInput.value || "Ramy";
nameText.innerText=txt;

let vals=[...colors].map(x=>x.value);
let grad=`linear-gradient(90deg,${vals.join(",")})`;

nameText.style.background=grad;

code.innerText=`grad#r50#o1#${vals.map(v=>v.replace("#","")).join("#")}#namewave`;
}

nameInput.addEventListener("input",update);
colors.forEach(c=>c.addEventListener("input",update));

update();
</script>

</body>
</html>
