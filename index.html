<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Visible Gradient Name</title>

<style>
body{
  background:#0b0b10;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:450px;
  padding:20px;
  background:#151522;
  border-radius:15px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

.colorRow{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

input[type="color"]{
  width:60px;
  height:35px;
  cursor:pointer;
}

/* 👑 الاسم ظاهر + عليه تدرج بدون اختفاء */
.name{
  font-size:28px;
  font-weight:bold;
  text-align:center;
  margin-top:15px;
  position:relative;
}

/* overlay gradient فوق النص */
.name::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:100%;

  background:var(--grad);
  -webkit-background-clip:text;
  color:transparent;
}

/* output */
.output{
  margin-top:10px;
  background:#0d0d14;
  padding:10px;
  border-radius:8px;
  font-family:monospace;
  word-break:break-all;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#6c5ce7;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>🌈 XAT Visible Gradient Name</h2>

<input id="name" placeholder="Enter Name">

<div class="colorRow">C1 <input type="color" id="c1"></div>
<div class="colorRow">C2 <input type="color" id="c2"></div>
<div class="colorRow">C3 <input type="color" id="c3"></div>
<div class="colorRow">C4 <input type="color" id="c4"></div>
<div class="colorRow">C5 <input type="color" id="c5"></div>

<button onclick="generate()">Apply</button>

<div id="preview"></div>

<div class="output" id="code"></div>

</div>

<script>
function generate(){

  const name = document.getElementById("name").value || "USER";

  const colors = [
    document.getElementById("c1").value || "#7B7CA3",
    document.getElementById("c2").value || "#999acb",
    document.getElementById("c3").value || "#999acb",
    document.getElementById("c4").value || "#B7B8F2",
    document.getElementById("c5").value || "#fcfcf0"
  ];

  const gradient = `linear-gradient(to right, ${colors.join(",")})`;

  document.getElementById("preview").innerHTML =
    `<div class="name" data-text="${name}" style="--grad:${gradient}">
      ${name}
    </div>`;

  const code =
    `glow#${colors[0]}#grad#r50#o1#` + colors.join("#");

  document.getElementById("code").innerText = code;
}
</script>

</body>
</html>
