<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ramy XAT Profile Viewer</title>

<style>
body{
  background:#05060a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:30px;
}

input,button{
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

.card{
  margin-top:20px;
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  display:inline-block;
  min-width:300px;
}

img{
  width:120px;
  border-radius:20px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🌍 XAT Profile Search</h1>

<input id="userInput" placeholder="Enter username or ID">
<button onclick="fetchData()">Search</button>

<div class="card">
  <p>Full Name: <span id="name">-</span></p>
  <p>ID: <span id="id">-</span></p>
  <p>Username: <span id="nick">-</span></p>
  <img id="avatar" />
</div>

<script>

async function fetchData(){
  const u = document.getElementById("userInput").value;

  if(!u){
    alert("Enter username");
    return;
  }

  try{

    const url = "https://pythbots.com/api/xatprofile.php?u=" + u;

    const res = await fetch(url);
    const d = await res.json();

    document.getElementById("name").innerText = d.name || "N/A";
    document.getElementById("id").innerText = d.id || "N/A";
    document.getElementById("nick").innerText = d.nick || d.username || "N/A";
    document.getElementById("avatar").src = d.avatar || "";

  }catch(e){
    document.getElementById("name").innerText = "Error loading data";
  }
}

</script>

</body>
</html>
