<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT Engine VIP</title>

<style>
body{
  background:#0b0b10;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:420px;
  padding:20px;
  background:#151522;
  border-radius:15px;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#6c5ce7;
  color:#fff;
  font-weight:bold;
}

.output{
  margin-top:10px;
  background:#0d0d14;
  padding:10px;
  border-radius:8px;
  font-family:monospace;
  word-break:break-all;
}

/* Glow */
.glow{
  text-shadow:0 0 10px #6c5ce7, 0 0 20px #6c5ce7;
}

/* Wave */
.wave span{
  display:inline-block;
  animation:wave 1.2s infinite ease-in-out;
}

.wave span:nth-child(2){animation-delay:0.1s}
.wave span:nth-child(3){animation-delay:0.2s}
.wave span:nth-child(4){animation-delay:0.3s}
.wave span:nth-child(5){animation-delay:0.4s}

@keyframes wave{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
</style>
</head>

<body>

<div class="box">

<h2>🔥 XAT ENGINE</h2>

<input id="name" placeholder="Name">
<input id="glow" placeholder="Glow Color (#000000)">

<input id="c1" placeholder="Color 1">
<input id="c2" placeholder="Color 2">
<input id="c3" placeholder="Color 3">
<input id="c4" placeholder="Color 4">
<input id="c5" placeholder="Color 5">

<button onclick="generate()">Generate</button>

<div id="preview" class="output"></div>
<div id="result" class="output"></div>

</div>

<script>
function waveText(text){
  return '<div class="wave">' +
    text.split('').map(c=>`<span>${c}</span>`).join('') +
  '</div>';
}

function generate(){
  const name = document.getElementById("name").value || "USER";
  const glow = document.getElementById("glow").value || "#000000";

  let colors = [
    document.getElementById("c1").value,
    document.getElementById("c2").value,
    document.getElementById("c3").value,
    document.getElementById("c4").value,
    document.getElementById("c5").value
  ];

  colors = colors.map(c => c || "#999999");

  const code = `glow#${glow}#grad#r50#o1#` + colors.join("#");

  document.getElementById("preview").innerHTML =
    `<div class="glow">${waveText(name)}</div>`;

  document.getElementById("result").innerText = code;
}
</script>

</body>
</html>
