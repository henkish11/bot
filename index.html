<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XAT Profile Search</title>

<style>
body{
  background:#05060a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

input,button{
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

.card{
  margin-top:20px;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  display:inline-block;
  min-width:320px;
}

img{
  width:100px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🌍 XAT PROFILE SEARCH</h1>

<input id="u" placeholder="Enter ID or Username">
<button onclick="search()">Search</button>

<div class="card" id="out">No data</div>

<script>

// 🔗 API مباشرة من كودك
const API = "https://pythbots.com/api/xatprofile.php?u=";

// 🧠 fallback لو API فشل
const fallback = {
  name: "Not Found",
  id: "-",
  username: "-",
  avatar: "https://xatimg.com/image/NTKWfOtODi9Z.jpg"
};

async function search(){
  const q = document.getElementById("u").value;

  if(!q) return;

  try{
    const res = await fetch(API + q);
    const d = await res.json();

    // لو البيانات ناقصة
    const data = {
      name: d.name || fallback.name,
      id: d.id || fallback.id,
      username: d.nick || d.username || fallback.username,
      avatar: d.avatar || fallback.avatar
    };

    render(data);

  }catch(e){
    render(fallback);
  }
}

function render(d){
  document.getElementById("out").innerHTML = `
    👤 Name: ${d.name}<br>
    🆔 ID: ${d.id}<br>
    🔖 Username: ${d.username}<br>
    <img src="${d.avatar}">
  `;
}

</script>

</body>
</html>
