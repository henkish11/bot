<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAT Gradient Code Generator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#050505,#111,#1a1a1a);
font-family:Arial, sans-serif;
color:white;
padding:20px;
}

.panel{
width:900px;
max-width:100%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(16px);
border-radius:25px;
padding:30px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
text-align:center;
}

h1{
font-size:34px;
margin-bottom:25px;
}

label{
display:block;
margin:12px 0 8px;
font-size:18px;
font-weight:bold;
}

input[type=text]{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:18px;
text-align:center;
outline:none;
}

.colors{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-top:10px;
}

.colors input,
#glow{
width:100%;
height:60px;
border:none;
border-radius:14px;
cursor:pointer;
background:none;
}

.preview{
margin-top:30px;
padding:30px;
border-radius:20px;
background:#000;
box-shadow:inset 0 0 20px rgba(255,255,255,0.08);
}

#namePreview{
font-size:64px;
font-weight:900;
display:inline-block;
background-size:300% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
color:transparent;
animation:move 3s linear infinite;
}

@keyframes move{
0%{background-position:0%;}
100%{background-position:300%;}
}

button{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#codeBox{
margin-top:25px;
background:#111;
padding:18px;
border-radius:14px;
font-size:18px;
color:#00ffcc;
word-break:break-all;
min-height:60px;
display:flex;
justify-content:center;
align-items:center;
}
</style>
</head>
<body>

<div class="panel">

<h1>👑 XAT COLOR SYSTEM</h1>

<label>Your Name</label>
<input type="text" id="username" value="Ramy">

<label>Glow Color</label>
<input type="color" id="glow" value="#000000">

<label>Choose 5 Gradient Colors</label>
<div class="colors">
<input type="color" value="#7B7CA3">
<input type="color" value="#999acb">
<input type="color" value="#999acb">
<input type="color" value="#B7B8F2">
<input type="color" value="#fcfcf0">
</div>

<button onclick="generate()">🚀 Show Result</button>
<button onclick="copyCode()">📋 Copy Code</button>

<div class="preview">
<div id="namePreview">Ramy</div>
</div>

<div id="codeBox">
glow#000000#grad#r50#o1#7B7CA3#999acb#999acb#B7B8F2#fcfcf0
</div>

</div>

<script>
const nameInput=document.getElementById("username");
const glowInput=document.getElementById("glow");
const colorInputs=document.querySelectorAll(".colors input");
const preview=document.getElementById("namePreview");
const codeBox=document.getElementById("codeBox");

function generate(){
let username=nameInput.value || "Ramy";
let glow=glowInput.value.replace("#","");
let colors=[...colorInputs].map(c=>c.value.replace("#",""));

preview.textContent=username;

preview.style.background=`linear-gradient(90deg,#${colors.join(",#")})`;

preview.style.textShadow=`
0 0 5px #${glow},
0 0 10px #${glow},
0 0 20px #${glow},
0 0 35px #${glow}
`;

let finalCode=`glow#${glow}#grad#r50#o1#${colors.join("#")}`;
codeBox.textContent=finalCode;
}

function copyCode(){
navigator.clipboard.writeText(codeBox.textContent);
alert("Copied 👑");
}

nameInput.addEventListener("keypress",function(e){
if(e.key==="Enter"){
generate();
}
});

colorInputs.forEach(input=>{
input.addEventListener("input",generate);
});

glowInput.addEventListener("input",generate);

generate();
</script>

</body>
</html>
