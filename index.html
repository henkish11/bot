<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egypt VIP Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
    background: black;
}

/* ===== BACKGROUND ===== */
#egyptBG {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    background: linear-gradient(to bottom, #000000, #1a1208, #000000);
}

/* ===== LOGIN ===== */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    z-index: 10;
}

.box {
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border: 1px solid gold;
    border-radius: 10px;
    text-align: center;
}

input {
    padding: 10px;
    width: 200px;
    text-align: center;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: gold;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* ===== CONTENT ===== */
#content {
    display: none;
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 40px;
}

.card {
    margin: auto;
    width: 80%;
    max-width: 800px;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    border: 1px solid gold;
    border-radius: 15px;
}

/* VIDEOS */
.videos {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

iframe {
    width: 200px;
    height: 140px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<canvas id="egyptBG"></canvas>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h3>VIP ACCESS</h3>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="login()">LOGIN</button>
        <p id="msg"></p>
    </div>
</div>

<!-- CONTENT -->
<div id="content">
    <div class="card">
        <h1>👑 RAMY EGYPT PROFILE</h1>

        <p>Pharaoh Trader VIP</p>
        <p>Egypt Power Activated ⚡</p>

        <div class="videos">
            <iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
            <iframe src="https://www.youtube.com/embed/b-KFYv7cuxk"></iframe>
            <iframe src="https://www.youtube.com/embed/OoyK4I3DyJ0"></iframe>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("egyptBG");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mummyX = canvas.width + 100;

/* LOGIN */
function login(){
    let pass = document.getElementById("pass").value;
    if(pass === "111991"){
        document.getElementById("login").style.display = "none";
        document.getElementById("content").style.display = "block";
        animate();
    } else {
        document.getElementById("msg").innerText = "Wrong password";
    }
}

/* DRAW PYRAMIDS */
function drawPyramids(){
    ctx.fillStyle = "#3b2f1b";

    // pyramid 1
    ctx.beginPath();
    ctx.moveTo(200, canvas.height-150);
    ctx.lineTo(400, 200);
    ctx.lineTo(600, canvas.height-150);
    ctx.fill();

    // pyramid 2
    ctx.beginPath();
    ctx.moveTo(500, canvas.height-150);
    ctx.lineTo(700, 250);
    ctx.lineTo(900, canvas.height-150);
    ctx.fill();
}

/* SAND */
function drawSand(){
    ctx.fillStyle = "#1a1208";
    ctx.fillRect(0, canvas.height-150, canvas.width, 150);
}

/* MUMMY */
function drawMummy(){
    ctx.fillStyle = "#dcdcdc";

    ctx.fillRect(mummyX, canvas.height-220, 50, 100);

    ctx.fillRect(mummyX+10, canvas.height-260, 30, 40);

    ctx.fillStyle = "red";
    ctx.fillRect(mummyX+15, canvas.height-245, 5, 5);
    ctx.fillRect(mummyX+30, canvas.height-245, 5, 5);

    mummyX -= 2;

    if(mummyX < -100){
        mummyX = canvas.width + 100;
    }
}

/* MAIN ANIMATION */
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawSand();
    drawPyramids();
    drawMummy();

    requestAnimationFrame(animate);
}
</script>

</body>
</html>
